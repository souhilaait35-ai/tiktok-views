<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER VISION | نظام تتبع الأجسام بالذكاء الاصطناعي</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* نظام التنسيق السيادي (UI) */
        :root {
            --brand-red: #e50914;
            --dark-bg: #050505;
            --surface: #141414;
            --glow-cyan: #00f2ff;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            overflow: hidden; height: 100vh;
        }

        /* حاوية الفيديو والكاميرا */
        .video-wrapper {
            position: relative;
            width: 100%; max-width: 900px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #webcam {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* مرآة للكاميرا الأمامية */
        }

        /* لوحة التتبع (Canvas) فوق الفيديو */
        #output_canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none; /* لكي لا تعيق الضغط على الفيديو */
        }

        /* شاشة التحميل (Loader) */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .ai-pulse {
            font-size: 5rem; color: var(--brand-red);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }

        /* الأزرار الاحترافية */
        .btn-cyber {
            background: linear-gradient(45deg, var(--brand-red), #ff1f1f);
            color: white; padding: 15px 40px;
            border-radius: 10px; font-weight: 900;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(229, 9, 20, 0.3);
        }
        .btn-cyber:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(229, 9, 20, 0.5); }
        .btn-cyber:disabled { background: #555; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>

<div id="loader">
    <div class="ai-pulse"><i class="fas fa-brain"></i></div>
    <h1 class="text-3xl font-black mt-10 tracking-widest text-white italic">AETHER <span class="text-red-600">VISION</span></h1>
    <p class="text-sm text-gray-500 mt-4 uppercase" id="status-text">Loading TensorFlow Models...</p>
</div>

<div class="flex flex-col items-center justify-center h-screen p-6 gap-6">
    <header class="text-center mb-6">
        <h2 class="text-4xl font-black text-white italic tracking-tighter">AETHER<span class="text-red-600">Vision v1.0</span></h2>
        <p class="text-gray-400 mt-2">نظام تتبع الأجسام الحقيقية بالذكاء الاصطناعي (أنسان، سيارة، إلخ)</p>
    </header>

    <div class="video-wrapper">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="flex gap-4">
        <button id="start-btn" class="btn-cyber text-lg" disabled>
            <i class="fas fa-camera ml-2"></i> تفعيل الكاميرا وبدء التتبع
        </button>
        <div class="p-4 bg-surface rounded-xl border border-white/5 flex items-center gap-3">
            <span class="text-xs text-gray-500">الحالة:</span>
            <span id="ai-status" class="text-xs font-bold text-yellow-500">جاري تحميل الموديل...</span>
        </div>
    </div>
</div>

<script>
    /* محرك الذكاء الاصطناعي (The AI Engine) */
    
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start-btn');
    const statusText = document.getElementById('status-text');
    const aiStatus = document.getElementById('ai-status');
    const loader = document.getElementById('loader');

    let model = undefined;
    let children = [];

    // 1. تحميل موديل COCO-SSD
    async function loadModel() {
        try {
            statusText.innerText = "Loading COCO-SSD Model (80 Objects)...";
            model = await cocoSsd.load();
            statusText.innerText = "Model Loaded Successfully!";
            loader.style.display = 'none';
            startBtn.disabled = false;
            aiStatus.innerText = "جاهز لبدء التتبع";
            aiStatus.classList.replace('text-yellow-500', 'text-emerald-500');
        } catch (error) {
            statusText.innerText = "Error Loading Model: " + error.message;
            statusText.classList.add('text-red-600');
        }
    }

    // 2. تفعيل الكاميرا
    function enableCam() {
        if (!model) return;
        
        startBtn.disabled = true;
        startBtn.innerHTML = "<i class='fas fa-sync fa-spin ml-2'></i> جارٍ التشغيل...";
        
        const constraints = { video: true };
        
        navigator.mediaDevices.getUserMedia(constraints).then(function(stream) {
            video.srcObject = stream;
            video.addEventListener('loadeddata', predictWebcam);
            aiStatus.innerText = "التتبع نشط الآن";
            aiStatus.classList.replace('text-emerald-500', 'text-cyan-400');
        }).catch(function(error) {
            aiStatus.innerText = "فشل الوصول للكاميرا: " + error.message;
            aiStatus.classList.replace('text-emerald-500', 'text-red-600');
        });
    }

    // 3. محرك التتبع (The Prediction Loop)
    function predictWebcam() {
        // ضبط حجم الكانفاس ليطابق الفيديو
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        // مسح الكانفاس قبل الرسم الجديد
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // البدء في التنبؤ
        model.detect(video).then(function (predictions) {
            // رسم التوقعات
            for (let n = 0; n < predictions.length; n++) {
                // إذا كانت نسبة التأكد أكثر من 60%
                if (predictions[n].score > 0.6) {
                    const p = predictions[n];
                    const x = p.bbox[0];
                    const y = p.bbox[1];
                    const width = p.bbox[2];
                    const height = p.bbox[3];
                    const label = p.class;
                    const score = (p.score * 100).toFixed(1);

                    // رسم المربع (Bounding Box)
                    ctx.strokeStyle = '#e50914'; // لون المربع (الأحمر)
                    ctx.lineWidth = 4;
                    ctx.strokeRect(x, y, width, height);

                    // رسم الخلفية للنص
                    ctx.fillStyle = '#e50914';
                    ctx.font = 'bold 18px Cairo';
                    const textWidth = ctx.measureText(`${label} (${score}%)`).width;
                    ctx.fillRect(x, y - 25, textWidth + 10, 25);

                    // رسم النص (اسم الجسم ونسبة التأكد)
                    ctx.fillStyle = '#fff';
                    ctx.fillText(`${label} (${score}%)`, x + 5, y - 7);
                }
            }
            
            // تكرار العملية في الإطار القادم (الحلقة اللانهائية)
            window.requestAnimationFrame(predictWebcam);
        });
    }

    // ربط الزر بالدالة
    startBtn.addEventListener('click', enableCam);

    // بدء التحميل عند فتح الصفحة
    loadModel();
</script>

</body>
</html>
