        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.8rem; margin-top: 1rem; }
        .movie-card {
            background: #141824;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .movie-card:hover { transform: translateY(-8px); border-color: #e50914; }
        .movie-poster { width: 100%; aspect-ratio: 2/3; background: #0a0d16; display: flex; align-items: center; justify-content: center; }
        .movie-poster canvas { width: 100%; height: 100%; object-fit: cover; }
        .movie-info { padding: 1rem; text-align: center; }
        .movie-title { font-weight: bold; font-size: 1rem; }
        .movie-year { font-size: 0.8rem; color: #aaa; }
        .coming-soon-note { font-size: 0.7rem; color: #ffaa33; margin-top: 0.5rem; background: rgba(0,0,0,0.6); padding: 0.2rem; border-radius: 20px; }
        .player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;

        .movie-poster-large { width: 100%; aspect-ratio: 16/9; background: #07090f; display: flex; align-items: center; justify-content: center; }
        .movie-poster-large canvas { width: 100%; height: 100%; object-fit: cover; }
        .video-placeholder { background: #0c0e17; padding: 1.5rem; text-align: center; display: flex; flex-direction: column; gap: 1rem; }
        .verify-btn { background: linear-gradient(90deg, #e50914, #b00710); border: none; padding: 12px 28px; border-radius: 50px; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; width: fit-content; margin: 0 auto; }
        .verify-btn:hover { transform: scale(1.02); }
        .close-player { position: absolute; top: 25px; right: 35px; color: white; font-size: 2rem; cursor: pointer; background: rgba(0,0,0,0.6); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .close-player:hover { background: #e50914; transform: rotate(90deg); }
        .rainbow-text { background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet); background-size: 200% auto; color: transparent; background-clip: text; animation: rainbow 2.5s linear infinite; font-weight: bold; }
        @keyframes rainbow { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        .progress-bar { width: 80%; height: 5px; background: #2a2a3a; border-radius: 10px; margin: 1rem auto; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #e50914; animation: loading 40s linear forwards; }
        @keyframes loading { 0% { width: 0%; } 100% { width: 100%; } }
        footer { text-align: center; padding: 2rem; color: #777; border-top: 1px solid #1e1e2f; margin-top: 2rem; }
        @media (max-width: 768px) { .navbar { flex-direction: column; text-align: center; } .hero h1 { font-size: 2rem; } }
    </style>

    // توليد صور افتراضية باستخدام Canvas
    function generatePosterCanvas(title, width, height) {
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createLinearGradient(0, 0, width, height);
        grad.addColorStop(0, '#1a1a2e');
        grad.addColorStop(1, '#16213e');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);
        ctx.font = `bold ${Math.floor(height * 0.1)}px 'Tajawal'`;
        ctx.fillStyle = '#e50914';
        ctx.textAlign = 'center';
        ctx.fillText(title.split(' ').slice(0, 2).join(' '), width/2, height/2);
        ctx.fillStyle = '#ffaa33';
        ctx.fillRect(width*0.2, height/2 + 10, width*0.6, 3);
        ctx.font = `${Math.floor(height * 0.05)}px 'Tajawal'`;
        ctx.fillStyle = '#aaa';
        ctx.fillText("🎬", width-40, height-20);
        return canvas;
    }

    function setPoster(container, title, width, height) {
        container.innerHTML = '';
        container.appendChild(generatePosterCanvas(title, width, height));

            grid.appendChild(card);
        });
    }
