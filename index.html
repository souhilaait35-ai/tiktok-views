<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🕷️ بلاك سبايدر - عنكبوت واقعي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(ellipse at center, #1a2a1a 0%, #0a0f0a 100%);
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            z-index: 1;
        }

        /* لوحة التحكم */
        .control-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            gap: 15px;
            z-index: 20;
            border: 1px solid #4caf50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.2);
        }

        button {
            background: none;
            border: none;
            color: #4caf50;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 40px;
            transition: all 0.2s;
            font-family: monospace;
            font-weight: bold;
        }

        button:hover {
            background: #4caf50;
            color: #000;
            box-shadow: 0 0 15px #4caf50;
        }

        .stats {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 20px;
            color: #4caf50;
            font-family: monospace;
            font-size: 11px;
            z-index: 20;
            border-left: 3px solid #4caf50;
        }

        .rainbow {
            position: fixed;
            bottom: 80px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            z-index: 20;
            background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbowMove 2s linear infinite;
        }

        @keyframes rainbowMove {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="control-panel">
        <button id="resetBtn">🔄 إعادة ضبط</button>
        <button id="legBtn">🦵 إظهار الأرجل</button>
        <button id="shadowBtn">🌑 إظهار الظل</button>
    </div>

    <div class="stats">
        🕷️ العنكبوت الأسطوري | 🦵 أرجل فعلية: 8
    </div>
    <div class="rainbow">صلو على النبي | تنبض الحياة</div>

    <script>
        (function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            let w, h;
            
            // ========== إعدادات العنكبوت ==========
            let spider = {
                x: 0, y: 0,
                targetX: 0, targetY: 0,
                legs: [],
                legCount: 8,
                bodyRadius: 22,
                eyeRadius: 6,
                speed: 0.09,
                legWave: 0,
                legSpeed: 0.12,
                showLegs: true,
                showShadow: true
            };
            
            let touchPoint = { x: null, y: null, active: false };
            let particles = [];
            let showParticles = true;
            
            // ========== كلاس الرجل الواقعية (بمفاصل متحركة) ==========
            class RealLeg {
                constructor(index, total) {
                    this.index = index;
                    this.baseAngle = (index / total) * Math.PI * 2;
                    this.segments = 4;
                    this.length = 72;
                    this.phase = index * 0.9;
                    this.wave = 0;
                }
                
                // حساب نقاط الرجل بالكامل
                getPoints(cx, cy, bodyR, waveTime, targetAngle) {
                    const points = [];
                    
                    // الزاوية الأساسية مع تموج طبيعي
                    let angle = this.baseAngle + Math.sin(waveTime * 1.5 + this.phase) * 0.45;
                    
                    // إذا كان هناك هدف (لمسة)، تميل الأرجل نحوه
                    if (targetAngle !== null) {
                        const diff = Math.sin(waveTime * 2 + this.phase) * 0.3;
                        angle = angle * 0.6 + targetAngle * 0.4 + diff;
                    }
                    
                    // نقطة البداية على الجسم
                    let x = cx + Math.cos(angle) * bodyR;
                    let y = cy + Math.sin(angle) * bodyR;
                    points.push({ x, y });
                    
                    const segLen = this.length / this.segments;
                    let lastAngle = angle;
                    
                    for (let i = 1; i <= this.segments; i++) {
                        const t = i / this.segments;
                        // انحناء طبيعي يزيد في نهاية الرجل
                        const bend = Math.sin(waveTime * 2.2 + this.phase + i) * 0.5;
                        const curve = (1 - t) * 0.6;
                        const angleOffset = curve + bend;
                        
                        let newAngle = lastAngle + angleOffset;
                        x += Math.cos(newAngle) * segLen;
                        y += Math.sin(newAngle) * segLen;
                        points.push({ x, y });
                        lastAngle = newAngle;
                    }
                    return points;
                }
                
                draw(ctx, cx, cy, bodyR, waveTime, targetAngle) {
                    if (!spider.showLegs) return;
                    
                    const points = this.getPoints(cx, cy, bodyR, waveTime, targetAngle);
                    if (points.length < 2) return;
                    
                    // ظل الرجل
                    ctx.beginPath();
                    ctx.moveTo(points[0].x + 3, points[0].y + 3);
                    for (let i = 1; i < points.length; i++) {
                        ctx.lineTo(points[i].x + 3, points[i].y + 3);
                    }
                    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
                    ctx.lineWidth = 6;
                    ctx.stroke();
                    
                    // الرجل الرئيسي
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    for (let i = 1; i < points.length; i++) {
                        ctx.lineTo(points[i].x, points[i].y);
                    }
                    ctx.strokeStyle = '#2a2a2a';
                    ctx.lineWidth = 5;
                    ctx.stroke();
                    ctx.strokeStyle = '#4a4a4a';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // المفاصل (تظهر كنقاط زائدة)
                    for (let i = 1; i < points.length; i++) {
                        ctx.beginPath();
                        ctx.arc(points[i].x, points[i].y, 2.2, 0, 2 * Math.PI);
                        ctx.fillStyle = '#5a5a5a';
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(points[i].x, points[i].y, 1, 0, 2 * Math.PI);
                        ctx.fillStyle = '#8a8a8a';
                        ctx.fill();
                    }
                }
            }
            
            // ========== جسيمات المشي ==========
            class StepParticle {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.life = 1;
                    this.size = Math.random() * 4 + 1;
                }
                update() {
                    this.life -= 0.03;
                    return this.life > 0;
                }
                draw(ctx) {
                    ctx.globalAlpha = this.life * 0.6;
                    ctx.fillStyle = '#4caf50';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
            
            // ========== إنشاء الأرجل ==========
            function initLegs() {
                spider.legs = [];
                for (let i = 0; i < spider.legCount; i++) {
                    spider.legs.push(new RealLeg(i, spider.legCount));
                }
            }
            
            // ========== إضافة أثر مشي ==========
            function addStepParticle(x, y) {
                particles.push(new StepParticle(x, y));
            }
            
            // ========== رسم الجسم بالكامل ==========
            function drawBody() {
                // الظل الدائري
                if (spider.showShadow) {
                    ctx.beginPath();
                    ctx.ellipse(spider.x + 4, spider.y + 6, spider.bodyRadius * 1.1, spider.bodyRadius * 0.7, 0, 0, 2 * Math.PI);
                    ctx.fillStyle = 'rgba(0,0,0,0.35)';
                    ctx.fill();
                }
                
                // تدرج الجسم
                const grad = ctx.createRadialGradient(spider.x - 5, spider.y - 5, 5, spider.x, spider.y, spider.bodyRadius);
                grad.addColorStop(0, '#3a3a3a');
                grad.addColorStop(1, '#151515');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(spider.x, spider.y, spider.bodyRadius, 0, 2 * Math.PI);
                ctx.fill();
                
                // التفاصيل السوداء على الظهر (نقوش)
                ctx.fillStyle = '#0a0a0a';
                ctx.beginPath();
                ctx.ellipse(spider.x - 6, spider.y - 4, 4, 3, 0, 0, 2 * Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(spider.x + 6, spider.y - 4, 4, 3, 0, 0, 2 * Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(spider.x, spider.y + 2, 5, 4, 0, 0, 2 * Math.PI);
                ctx.fill();
                
                // علامة القوة 💪
                ctx.font = `${spider.bodyRadius * 0.7}px monospace`;
                ctx.fillStyle = '#4caf50';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#4caf50';
                ctx.fillText('🕷️', spider.x - 12, spider.y - 10);
                ctx.fillText('💪', spider.x + 8, spider.y + 12);
                ctx.shadowBlur = 0;
            }
            
            // ========== العيون (تتبع لمستك) ==========
            function drawEyes() {
                const eyeOffX = spider.bodyRadius * 0.55;
                const eyeOffY = spider.bodyRadius * 0.55;
                let lookX = 0, lookY = 0;
                
                if (touchPoint.active && touchPoint.x && touchPoint.y) {
                    const dx = touchPoint.x - spider.x;
                    const dy = touchPoint.y - spider.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist > 0.1) {
                        lookX = (dx / dist) * 3.5;
                        lookY = (dy / dist) * 3.5;
                    }
                }
                
                // بياض العين
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(spider.x - eyeOffX, spider.y - eyeOffY, spider.eyeRadius, 0, 2 * Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(spider.x + eyeOffX, spider.y - eyeOffY, spider.eyeRadius, 0, 2 * Math.PI);
                ctx.fill();
                
                // بؤبؤ العين
                ctx.fillStyle = '#4caf50';
                ctx.beginPath();
                ctx.arc(spider.x - eyeOffX + lookX, spider.y - eyeOffY + lookY, 2.5, 0, 2 * Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(spider.x + eyeOffX + lookX, spider.y - eyeOffY + lookY, 2.5, 0, 2 * Math.PI);
                ctx.fill();
                
                // نقطة ضوء صغيرة
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(spider.x - eyeOffX + lookX - 1, spider.y - eyeOffY + lookY - 1, 0.8, 0, 2 * Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(spider.x + eyeOffX + lookX - 1, spider.y - eyeOffY + lookY - 1, 0.8, 0, 2 * Math.PI);
                ctx.fill();
            }
            
            // ========== تحديث الحركة ==========
            function updateMovement() {
                if (touchPoint.active && touchPoint.x && touchPoint.y) {
                    const dx = touchPoint.x - spider.x;
                    const dy = touchPoint.y - spider.y;
                    const dist = Math.hypot(dx, dy);
                    
                    if (dist > 3) {
                        spider.x += dx * spider.speed;
                        spider.y += dy * spider.speed;
                        spider.legWave += spider.legSpeed;
                        
                        // أثر مشي كل حركة
                        if (Math.random() < 0.25) {
                            addStepParticle(spider.x - 5, spider.y + 5);
                        }
                    } else {
                        spider.x = touchPoint.x;
                        spider.y = touchPoint.y;
                        // انفجار جسيمات عند الوصول
                        for (let i = 0; i < 6; i++) {
                            addStepParticle(spider.x, spider.y);
                        }
                    }
                } else {
                    spider.legWave += 0.03;
                }
            }
            
            // ========== رسم الخلفية (طبيعة مع خيوط العنكبوت) ==========
            function drawBackground() {
                // تدرج الخلفية
                const grad = ctx.createLinearGradient(0, 0, w, h);
                grad.addColorStop(0, '#0a1f0a');
                grad.addColorStop(1, '#051005');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);
                
                // شبكة خفيفة (خيوط العنكبوت الوهمية)
                ctx.strokeStyle = 'rgba(76, 175, 80, 0.12)';
                ctx.lineWidth = 0.8;
                for (let i = 0; i < w; i += 70) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(w - i, h);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(w, h - i);
                    ctx.stroke();
                }
            }
            
            // ========== حلقة الرسم ==========
            function animate() {
                if (!w || !h) return;
                
                updateMovement();
                
                // تحديث الجسيمات
                particles = particles.filter(p => p.update());
                
                drawBackground();
                
                // حساب الزاوية المستهدفة للأرجل
                let targetAngle = null;
                if (touchPoint.active && touchPoint.x && touchPoint.y) {
                    targetAngle = Math.atan2(touchPoint.y - spider.y, touchPoint.x - spider.x);
                }
                
                // رسم الأرجل
                for (let leg of spider.legs) {
                    leg.draw(ctx, spider.x, spider.y, spider.bodyRadius, spider.legWave, targetAngle);
                }
                
                drawBody();
                drawEyes();
                
                // رسم الجسيمات
                for (let p of particles) {
                    p.draw(ctx);
                }
                
                // رسم نقطة اللمس التفاعلية
                if (touchPoint.active && touchPoint.x && touchPoint.y) {
                    ctx.beginPath();
                    ctx.arc(touchPoint.x, touchPoint.y, 12, 0, 2 * Math.PI);
                    ctx.strokeStyle = '#4caf50';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(touchPoint.x, touchPoint.y, 5, 0, 2 * Math.PI);
                    ctx.fillStyle = 'rgba(76, 175, 80, 0.3)';
                    ctx.fill();
                }
                
                requestAnimationFrame(animate);
            }
            
            // ========== أحداث اللمس ==========
            function handleTouchStart(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = (touch.clientX - rect.left) * (w / rect.width);
                const y = (touch.clientY - rect.top) * (h / rect.height);
                touchPoint.x = x;
                touchPoint.y = y;
                touchPoint.active = true;
                for (let i = 0; i < 8; i++) addStepParticle(x, y);
            }
            
            function handleTouchMove(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const x = (touch.clientX - rect.left) * (w / rect.width);
                const y = (touch.clientY - rect.top) * (h / rect.height);
                touchPoint.x = x;
                touchPoint.y = y;
                touchPoint.active = true;
            }
            
            function handleTouchEnd(e) {
                e.preventDefault();
                touchPoint.active = false;
                for (let i = 0; i < 5; i++) addStepParticle(spider.x, spider.y);
            }
            
            // ========== تغيير الحجم ==========
            function resizeCanvas() {
                w = window.innerWidth;
                h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
                spider.x = w / 2;
                spider.y = h / 2;
                spider.targetX = w / 2;
                spider.targetY = h / 2;
            }
            
            // ========== الأزرار ==========
            document.getElementById('resetBtn').onclick = () => {
                spider.x = w / 2;
                spider.y = h / 2;
                touchPoint.active = false;
                for (let i = 0; i < 15; i++) addStepParticle(spider.x, spider.y);
            };
            
            let legVisible = true;
            document.getElementById('legBtn').onclick = (e) => {
                legVisible = !legVisible;
                spider.showLegs = legVisible;
                e.target.textContent = legVisible ? "🦵 إخفاء الأرجل" : "🦵 إظهار الأرجل";
            };
            
            let shadowVisible = true;
            document.getElementById('shadowBtn').onclick = (e) => {
                shadowVisible = !shadowVisible;
                spider.showShadow = shadowVisible;
                e.target.textContent = shadowVisible ? "🌑 إخفاء الظل" : "🌑 إظهار الظل";
            };
            
            // ========== بدء التشغيل ==========
            function init() {
                resizeCanvas();
                initLegs();
                for (let i = 0; i < 20; i++) addStepParticle(spider.x, spider.y);
                
                canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
                canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
                canvas.addEventListener('touchend', handleTouchEnd);
                window.addEventListener('resize', resizeCanvas);
                
                animate();
                console.log('🕷️ العنكبوت فائق الواقعية يعمل');
            }
            
            init();
        })();
    </script>
</body>
</html>
