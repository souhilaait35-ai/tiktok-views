<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بلاك سبكتر - ESP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        canvas { z-index: 10; }
        .info { position: fixed; bottom: 20px; left: 10px; color: #0f0; background: #000; padding: 8px; z-index: 20; font-family: monospace; }
        .crosshair { position: fixed; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; }
        .crosshair::before, .crosshair::after { content: ''; position: absolute; background: red; }
        .crosshair::before { top: 50%; left: 0; width: 100%; height: 2px; transform: translateY(-50%); }
        .crosshair::after { top: 0; left: 50%; width: 2px; height: 100%; transform: translateX(-50%); }
        .rainbow { position: fixed; bottom: 60px; left: 0; right: 0; text-align: center; font-size: 14px; font-weight: bold; z-index: 20; background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet); -webkit-background-clip: text; background-clip: text; color: transparent; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="crosshair"></div>
    <div class="rainbow">صلو على النبي</div>
    <div class="info" id="info">⏳ جاري طلب الكاميرا...</div>

    <script>
        (async function() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const info = document.getElementById('info');
            let prevFrame = null;
            
            try {
                info.innerText = "📷 طلب الكاميرا...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                await video.play();
                info.innerText = "✅ الكاميرا تعمل | ESP نشط";
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                function detectMotion(curr, prev) {
                    if (!prev) return [];
                    const w = curr.width, h = curr.height;
                    const cur = curr.data, pre = prev.data;
                    const rects = [];
                    const vis = new Array(w*h).fill(false);
                    for(let y=0; y<h; y+=10) {
                        for(let x=0; x<w; x+=10) {
                            const idx = (y*w+x)*4;
                            const d = Math.abs(cur[idx]-pre[idx]) + Math.abs(cur[idx+1]-pre[idx+1]) + Math.abs(cur[idx+2]-pre[idx+2]);
                            if(d > 60 && !vis[y*w+x]) {
                                let minX=x, maxX=x, minY=y, maxY=y;
                                let stack=[[x,y]];
                                vis[y*w+x]=true;
                                while(stack.length){
                                    const [cx,cy]=stack.pop();
                                    for(let dy=-10;dy<=10;dy+=10){
                                        for(let dx=-10;dx<=10;dx+=10){
                                            const nx=cx+dx, ny=cy+dy;
                                            if(nx>=0 && nx<w && ny>=0 && ny<h && !vis[ny*w+nx]){
                                                const nidx = (ny*w+nx)*4;
                                                const nd = Math.abs(cur[nidx]-pre[nidx]) + Math.abs(cur[nidx+1]-pre[nidx+1]) + Math.abs(cur[nidx+2]-pre[nidx+2]);
                                                if(nd > 60){
                                                    vis[ny*w+nx]=true;
                                                    stack.push([nx,ny]);
                                                    minX=Math.min(minX,nx);
                                                    maxX=Math.max(maxX,nx);
                                                    minY=Math.min(minY,ny);
                                                    maxY=Math.max(maxY,ny);
                                                }
                                            }
                                        }
                                    }
                                }
                                const bw = maxX-minX, bh = maxY-minY;
                                if(bw*bh > 600) rects.push({x:minX, y:minY, w:bw, h:bh});
                            }
                        }
                    }
                    return rects;
                }
                
                function draw(rects){
                    for(let r of rects){
                        const dist = Math.floor(5000/(r.h+1));
                        ctx.strokeStyle='red';
                        ctx.strokeRect(r.x,r.y,r.w,r.h);
                        ctx.beginPath();
                        ctx.moveTo(r.x+r.w/2,r.y+r.h);
                        ctx.lineTo(r.x+r.w/2,r.y+r.h+15);
                        ctx.strokeStyle='blue';
                        ctx.stroke();
                        ctx.fillStyle='#ffff00';
                        ctx.fillText(`${dist}m`, r.x+r.w-25, r.y-5);
                        ctx.fillStyle='white';
                        ctx.fillText("TARGET", r.x+5, r.y-3);
                        ctx.fillStyle='#00ff00';
                        ctx.fillRect(r.x, r.y-8, r.w*0.7, 4);
                    }
                }
                
                function frame(){
                    if(!video.videoWidth){ requestAnimationFrame(frame); return; }
                    if(canvas.width!==video.videoWidth) canvas.width=video.videoWidth;
                    if(canvas.height!==video.videoHeight) canvas.height=video.videoHeight;
                    ctx.drawImage(video,0,0,canvas.width,canvas.height);
                    const curr = ctx.getImageData(0,0,canvas.width,canvas.height);
                    const rects = detectMotion(curr, prevFrame);
                    draw(rects);
                    prevFrame = curr;
                    requestAnimationFrame(frame);
                }
                frame();
                
            } catch(e){
                info.innerText = "❌ خطأ: "+e.message;
                alert("يرجى السماح بالوصول إلى الكاميرا من إعدادات الهاتف");
            }
        })();
    </script>
</body>
</html>
