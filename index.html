<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>بلاك تنتكل - تأثير المخالب باللمس</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none; /* يمنع تحريك الصفحة */
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        .info {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            font-family: monospace;
            font-size: 12px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">👆 المس الشاشة | بلاك تنتكل - تأثير المخالب</div>

    <script>
        (function() {
            // ========== الإعدادات (مأخوذة من كودك) ==========
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            let w, h;
            let mouse = { x: null, y: null };
            let target = { x: 0, y: 0 };
            let isLowPowerDevice = false;
            let areaFactor = 1;
            
            // إعدادات المخالب
            const maxl = 400;
            const minl = 50;
            const n = isLowPowerDevice ? 22 : 28;
            const numt = Math.max(100, Math.floor((isLowPowerDevice ? 320 : 520) * areaFactor));
            let tent = [];
            
            // ========== دالة المخالب (Tentacle) ==========
            class Tentacle {
                constructor(x, y, length, segments, angle) {
                    this.x = x;
                    this.y = y;
                    this.length = length;
                    this.segments = segments;
                    this.angle = angle;
                    this.points = [];
                    this.calculatePoints();
                }
                
                calculatePoints() {
                    this.points = [];
                    const step = this.length / this.segments;
                    for (let i = 0; i <= this.segments; i++) {
                        const dist = step * i;
                        const angleVariation = Math.sin(Date.now() * 0.002 + i * 0.3) * 0.3;
                        const currentAngle = this.angle + angleVariation;
                        const xOff = Math.cos(currentAngle) * dist;
                        const yOff = Math.sin(currentAngle) * dist;
                        this.points.push({
                            x: this.x + xOff,
                            y: this.y + yOff
                        });
                    }
                }
                
                update(targetX, targetY) {
                    // تحديث اتجاه المخلب نحو الهدف
                    const dx = targetX - this.x;
                    const dy = targetY - this.y;
                    this.angle = Math.atan2(dy, dx);
                    this.calculatePoints();
                }
                
                draw(ctx) {
                    if (this.points.length < 2) return;
                    ctx.beginPath();
                    ctx.moveTo(this.points[0].x, this.points[0].y);
                    for (let i = 1; i < this.points.length; i++) {
                        ctx.lineTo(this.points[i].x, this.points[i].y);
                    }
                    ctx.strokeStyle = `hsl(${Date.now() * 0.05 + this.x * 0.1}deg, 100%, 60%)`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            }
            
            // ========== إنشاء المخالب ==========
            function initTentacles() {
                tent = [];
                for (let i = 0; i < numt; i++) {
                    tent.push(new Tentacle(
                        Math.random() * w,
                        Math.random() * h,
                        Math.random() * (maxl - minl) + minl,
                        n,
                        Math.random() * 2 * Math.PI
                    ));
                }
            }
            
            // ========== أحداث اللمس (التحويل من ماوس إلى لمس) ==========
            function handleTouchStart(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                mouse.x = (touch.clientX - rect.left) * (w / rect.width);
                mouse.y = (touch.clientY - rect.top) * (h / rect.height);
                target.x = mouse.x;
                target.y = mouse.y;
            }
            
            function handleTouchMove(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                mouse.x = (touch.clientX - rect.left) * (w / rect.width);
                mouse.y = (touch.clientY - rect.top) * (h / rect.height);
                target.x = mouse.x;
                target.y = mouse.y;
            }
            
            function handleTouchEnd(e) {
                e.preventDefault();
                mouse.x = null;
                mouse.y = null;
                // ارجع المخالب للمنتصف
                target.x = w / 2;
                target.y = h / 2;
            }
            
            // ========== رسم الخلفية والمخالب ==========
            function drawBackground() {
                const grad = ctx.createLinearGradient(0, 0, w, h);
                grad.addColorStop(0, '#0a0a1a');
                grad.addColorStop(1, '#1a1a2e');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);
            }
            
            function draw() {
                if (!w || !h) return;
                
                drawBackground();
                
                // تحديث المخالب نحو الهدف
                for (let t of tent) {
                    t.update(target.x, target.y);
                    t.draw(ctx);
                }
                
                // رسم دائرة عند نقطة اللمس
                if (mouse.x && mouse.y) {
                    ctx.beginPath();
                    ctx.arc(mouse.x, mouse.y, 15, 0, 2 * Math.PI);
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(mouse.x, mouse.y, 5, 0, 2 * Math.PI);
                    ctx.fillStyle = '#ff0000';
                    ctx.fill();
                }
                
                requestAnimationFrame(draw);
            }
            
            // ========== تغيير حجم الشاشة ==========
            function resizeCanvas() {
                w = window.innerWidth;
                h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
                target.x = w / 2;
                target.y = h / 2;
                initTentacles();
            }
            
            // ========== ربط الأحداث ==========
            function initEvents() {
                canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
                canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
                canvas.addEventListener('touchend', handleTouchEnd);
                window.addEventListener('resize', resizeCanvas);
            }
            
            // ========== بدء التشغيل ==========
            function init() {
                resizeCanvas();
                initEvents();
                draw();
                console.log('✅ بلاك تنتكل - تأثير المخالب يعمل باللمس');
            }
            
            init();
        })();
    </script>
</body>
</html>
