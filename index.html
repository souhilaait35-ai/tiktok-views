<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>بلاك سبكتر - ESP تتبع الأجسام</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        /* طبقة طلب الصلاحية (مثل موقع cinema4u) */
        .permission-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(16px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .permission-card {
            background: #1a1f2e;
            border-radius: 32px;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(229,9,20,0.5);
            box-shadow: 0 30px 40px -20px black;
        }
        .permission-card h3 {
            color: #e50914;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }
        .permission-card p {
            color: #ccc;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .permission-card button {
            background: linear-gradient(90deg, #e50914, #b00710);
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .permission-card button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(229,9,20,0.5);
        }
        .rainbow-text {
            margin-top: 1rem;
            background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
            background-size: 200% auto;
            color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            animation: rainbow 2.5s linear infinite;
            font-weight: bold;
        }
        @keyframes rainbow {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        /* واجهة ESP */
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        canvas {
            z-index: 10;
        }
        .stats {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 8px;
            color: #0f0;
            font-size: 12px;
            font-family: monospace;
            z-index: 20;
            border-left: 3px solid #0f0;
        }
        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 30px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 20;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: red;
        }
        .crosshair::before {
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            transform: translateY(-50%);
        }
        .crosshair::after {
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
        }
        .esp-footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: #888;
            z-index: 20;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<!-- طبقة طلب الصلاحية (مثل موقع cinema4u) -->
<div id="permissionOverlay" class="permission-overlay">
    <div class="permission-card">
        <h3>🎥 تحقق أمني</h3>
        <p>لتفعيل نظام ESP وتتبع الأجسام، نحتاج إلى الوصول إلى كاميرا هاتفك.</p>
        <button id="verifyBtn">✅ تحقق من هويتك</button>
        <div class="rainbow-text">صلو على النبي</div>
        <p style="font-size: 0.7rem; margin-top: 1rem;">لن يتم استخدام الكاميرا إلا لعرض الفيديو وتتبع الحركة</p>
    </div>
</div>

<!-- واجهة ESP -->
<div id="espContainer" class="container hidden">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="stats">
        🎯 الأهداف: <span id="targetCount">0</span><br>
        🟢 الحالة: <span id="statusText">جاري التشغيل...</span>
    </div>
    <div class="crosshair"></div>
    <div class="esp-footer">بلاك سبكتر - نظام ESP | صل على النبي</div>
</div>

<script>
    // ========== العناصر ==========
    const permissionOverlay = document.getElementById('permissionOverlay');
    const espContainer = document.getElementById('espContainer');
    const verifyBtn = document.getElementById('verifyBtn');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const targetSpan = document.getElementById('targetCount');
    const statusSpan = document.getElementById('statusText');
    
    let prevFrame = null;
    let stream = null;
    let animationId = null;
    
    // ========== إعدادات الكشف ==========
    const MIN_AREA = 600;
    const MAX_AREA = 30000;
    const THRESHOLD = 35;
    
    // ========== طلب الكاميرا وبدء التتبع ==========
    async function startCameraAndTracking() {
        statusSpan.innerText = "جاري طلب الكاميرا...";
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            await video.play();
            
            statusSpan.innerText = "✅ الكاميرا تعمل";
            
            // ضبط حجم canvas
            setTimeout(() => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                startTracking();
            }, 100);
            
        } catch(err) {
            statusSpan.innerText = "❌ فشل: " + err.message;
            alert("لا يمكن الوصول إلى الكاميرا. تأكد من منح الصلاحية.");
        }
    }
    
    // ========== كشف الحركة ==========
    function detectMotion(currentFrame, prevFrame) {
        if (!prevFrame) return [];
        
        const width = currentFrame.width;
        const height = currentFrame.height;
        const currData = currentFrame.data;
        const prevData = prevFrame.data;
        
        const rects = [];
        const visited = new Array(width * height).fill(false);
        
        for (let y = 0; y < height; y += 8) {
            for (let x = 0; x < width; x += 8) {
                const idx = (y * width + x) * 4;
                const rDiff = Math.abs(currData[idx] - prevData[idx]);
                const gDiff = Math.abs(currData[idx+1] - prevData[idx+1]);
                const bDiff = Math.abs(currData[idx+2] - prevData[idx+2]);
                const avgDiff = (rDiff + gDiff + bDiff) / 3;
                
                if (avgDiff > THRESHOLD && !visited[y * width + x]) {
                    let minX = x, maxX = x, minY = y, maxY = y;
                    let stack = [[x, y]];
                    visited[y * width + x] = true;
                    
                    while (stack.length > 0) {
                        const [cx, cy] = stack.pop();
                        for (let dy = -8; dy <= 8; dy += 8) {
                            for (let dx = -8; dx <= 8; dx += 8) {
                                const nx = cx + dx;
                                const ny = cy + dy;
                                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                    const nidx = (ny * width + nx) * 4;
                                    const nDiff = (Math.abs(currData[nidx] - prevData[nidx]) +
                                                  Math.abs(currData[nidx+1] - prevData[nidx+1]) +
                                                  Math.abs(currData[nidx+2] - prevData[nidx+2])) / 3;
                                    if (nDiff > THRESHOLD && !visited[ny * width + nx]) {
                                        visited[ny * width + nx] = true;
                                        stack.push([nx, ny]);
                                        minX = Math.min(minX, nx);
                                        maxX = Math.max(maxX, nx);
                                        minY = Math.min(minY, ny);
                                        maxY = Math.max(maxY, ny);
                                    }
                                }
                            }
                        }
                    }
                    
                    const boxWidth = maxX - minX;
                    const boxHeight = maxY - minY;
                    const area = boxWidth * boxHeight;
                    
                    if (area > MIN_AREA && area < MAX_AREA) {
                        rects.push({
                            x: minX,
                            y: minY,
                            w: boxWidth,
                            h: boxHeight
                        });
                    }
                }
            }
        }
        
        return rects;
    }
    
    // ========== رسم ESP ==========
    function drawESP(rects) {
        for (let r of rects) {
            const distance = Math.floor(6000 / (r.h + 1));
            const healthPercent = Math.min(100, Math.max(30, 100 - (distance / 3)));
            const healthWidth = r.w * (healthPercent / 100);
            
            // المربع الأحمر
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 2;
            ctx.strokeRect(r.x, r.y, r.w, r.h);
            
            // الخط الأزرق
            ctx.beginPath();
            ctx.moveTo(r.x + r.w/2, r.y + r.h);
            ctx.lineTo(r.x + r.w/2, r.y + r.h + 15);
            ctx.strokeStyle = '#00aaff';
            ctx.stroke();
            
            // شريط الحياة
            ctx.fillStyle = '#330000';
            ctx.fillRect(r.x, r.y - 8, r.w, 4);
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(r.x, r.y - 8, healthWidth, 4);
            
            // المسافة
            ctx.fillStyle = '#ffff00';
            ctx.font = "bold 10px monospace";
            ctx.fillText(`${distance}m`, r.x + r.w - 25, r.y - 5);
            
            // نص الهدف
            ctx.fillStyle = '#ffffff';
            ctx.font = "bold 9px monospace";
            ctx.fillText("TARGET", r.x + 5, r.y - 3);
        }
        
        targetSpan.innerText = rects.length;
    }
    
    // ========== حلقة التتبع ==========
    function processFrame() {
        if (!video.videoWidth || !video.videoHeight) {
            requestAnimationFrame(processFrame);
            return;
        }
        
        if (canvas.width !== video.videoWidth) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        }
        
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const rects = detectMotion(currentFrame, prevFrame);
        drawESP(rects);
        prevFrame = currentFrame;
        
        requestAnimationFrame(processFrame);
    }
    
    function startTracking() {
        if (animationId) cancelAnimationFrame(animationId);
        prevFrame = null;
        processFrame();
    }
    
    // ========== زر التحقق ==========
    verifyBtn.onclick = async () => {
        verifyBtn.disabled = true;
        verifyBtn.textContent = 'جاري التحقق...';
        
        await startCameraAndTracking();
        
        setTimeout(() => {
            permissionOverlay.classList.add('hidden');
            espContainer.classList.remove('hidden');
        }, 1000);
    };
</script>
</body>
</html>
