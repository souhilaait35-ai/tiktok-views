<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💣 العنكبوت النووي | CSS النهائي</title>
    <style>
        /* ========== القنبلة CSS النووية ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* الخلفية النووية */
        body {
            background: radial-gradient(ellipse at center, #1a2a1a 0%, #0a0f0a 100%);
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            font-family: 'Courier New', 'Segoe UI', monospace;
            position: relative;
        }

        /* طبقة التوهج النووي */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(76, 175, 80, 0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            transition: background 0.05s linear;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            z-index: 1;
        }

        /* لوحة التحكم النووية */
        .nuke-panel {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            gap: 15px;
            z-index: 20;
            border: 1px solid #4caf50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.4), inset 0 0 10px rgba(76, 175, 80, 0.2);
            animation: panelGlow 2s infinite alternate;
        }

        @keyframes panelGlow {
            0% { box-shadow: 0 0 20px rgba(76, 175, 80, 0.4); border-color: #4caf50; }
            100% { box-shadow: 0 0 40px rgba(76, 175, 80, 0.8); border-color: #8bc34a; }
        }

        .nuke-btn {
            background: linear-gradient(135deg, #1a2a1a, #0a1a0a);
            border: 1px solid #4caf50;
            color: #4caf50;
            font-size: 18px;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: monospace;
            text-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
        }

        .nuke-btn:hover {
            background: #4caf50;
            color: #000;
            box-shadow: 0 0 20px #4caf50;
            transform: scale(1.05);
            border-color: #fff;
        }

        /* شريط المعلومات النووي */
        .nuke-stats {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 8px 15px;
            border-radius: 20px;
            color: #4caf50;
            font-family: monospace;
            font-size: 12px;
            z-index: 20;
            border-left: 4px solid #4caf50;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            animation: statsPulse 1.5s infinite;
        }

        @keyframes statsPulse {
            0% { border-left-color: #4caf50; text-shadow: 0 0 0px #4caf50; }
            100% { border-left-color: #8bc34a; text-shadow: 0 0 3px #4caf50; }
        }

        /* النص القوس قزح النووي */
        .rainbow-nuke {
            position: fixed;
            bottom: 90px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            z-index: 20;
            background: linear-gradient(90deg, #ff0000, #ff7700, #ffff00, #00ff00, #0000ff, #8b00ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbowMove 2s linear infinite, textGlow 1s alternate;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        @keyframes rainbowMove {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        @keyframes textGlow {
            from { filter: drop-shadow(0 0 2px rgba(255,255,255,0.3)); }
            to { filter: drop-shadow(0 0 8px rgba(255,255,255,0.6)); }
        }

        /* إشعار اللمس */
        .touch-hint {
            position: fixed;
            bottom: 140px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(76, 175, 80, 0.6);
            font-size: 11px;
            font-family: monospace;
            z-index: 20;
            animation: hintBlink 2s infinite;
        }

        @keyframes hintBlink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; text-shadow: 0 0 5px #4caf50; }
        }

        /* تأثير النقر على الزر */
        .nuke-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="nuke-panel">
        <button class="nuke-btn" id="resetBtn">💣 إعادة ضبط</button>
        <button class="nuke-btn" id="legBtn">🦵 إخفاء الأرجل</button>
        <button class="nuke-btn" id="shadowBtn">🌑 إخفاء الظل</button>
    </div>

    <div class="nuke-stats">
        🕷️ العنكبوت النووي | 🦵 أرجل مفعلة | ⚡ CSS قنبلة
    </div>
    <div class="rainbow-nuke">⚛️ صلوا على النبي | القنبلة العنكبوتية النهائية ⚛️</div>
    <div class="touch-hint">👆 المس الشاشة | العنكبوت يتحرك نحو إصبعك</div>

    <script>
        (function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            let w, h;
            
            // متحرك CSS للخلفية
            document.body.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                document.body.style.setProperty('--x', `${(touch.clientX / window.innerWidth) * 100}%`);
                document.body.style.setProperty('--y', `${(touch.clientY / window.innerHeight) * 100}%`);
            });
            
            // ========== إعدادات العنكبوت ==========
            let spider = {
                x: 0, y: 0,
                targetX: 0, targetY: 0,
                legs: [],
                legCount: 8,
                bodyRadius: 22,
                eyeRadius: 6,
                speed: 0.09,
                legWave: 0,
                legSpeed: 0.12,
                showLegs: true,
                showShadow: true
            };
            
            let touchPoint = { x: null, y: null, active: false };
            let particles = [];
            
            // ========== كلاس الرجل الواقعية ==========
            class RealLeg {
                constructor(index, total) {
                    this.index = index;
                    this.baseAngle = (index / total) * Math.PI * 2;
                    this.segments = 4;
                    this.length = 72;
                    this.phase = index * 0.9;
                }
                
                getPoints(cx, cy, bodyR, waveTime, targetAngle) {
                    const points = [];
                    let angle = this.baseAngle + Math.sin(waveTime * 1.5 + this.phase) * 0.45;
                    if (targetAngle !== null) {
                        angle = angle * 0.6 + targetAngle * 0.4;
                    }
                    let x = cx + Math.cos(angle) * bodyR;
                    let y = cy + Math.sin(angle) * bodyR;
                    points.push({ x, y });
                    const segLen = this.length / this.segments;
                    let lastAngle = angle;
                    for (let i = 1; i <= this.segments; i++) {
                        const bend = Math.sin(waveTime * 2.2 + this.phase + i) * 0.5;
                        const curve = (1 - (i / this.segments)) * 0.6;
                        const newAngle = lastAngle + curve + bend;
                        x += Math.cos(newAngle) * segLen;
                        y += Math.sin(newAngle) * segLen;
                        points.push({ x, y });
                        lastAngle = newAngle;
                    }
                    return points;
                }
                
                draw(ctx, cx, cy, bodyR, waveTime, targetAngle) {
                    if (!spider.showLegs) return;
                    const points = this.getPoints(cx, cy, bodyR, waveTime, targetAngle);
                    if (points.length < 2) return;
                    ctx.beginPath();
                    ctx.moveTo(points[0].x + 2, points[0].y + 2);
                    for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x + 2, points[i].y + 2);
                    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
                    ctx.lineWidth = 6;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
                    ctx.strokeStyle = '#2a2a2a';
                    ctx.lineWidth = 5;
                    ctx.stroke();
                    ctx.strokeStyle = '#4a4a4a';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    for (let i = 1; i < points.length; i++) {
                        ctx.beginPath();
                        ctx.arc(points[i].x, points[i].y, 2.2, 0, 2 * Math.PI);
                        ctx.fillStyle = '#5a5a5a';
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(points[i].x, points[i].y, 1, 0, 2 * Math.PI);
                        ctx.fillStyle = '#8a8a8a';
                        ctx.fill();
                    }
                }
            }
            
            class StepParticle {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.life = 1;
                    this.size = Math.random() * 4 + 1;
                }
                update() { this.life -= 0.03; return this.life > 0; }
                draw(ctx) {
                    ctx.globalAlpha = this.life * 0.6;
                    ctx.fillStyle = '#4caf50';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
            
            function initLegs() {
                spider.legs = [];
                for (let i = 0; i < spider.legCount; i++) spider.legs.push(new RealLeg(i, spider.legCount));
            }
            
            function addStepParticle(x, y) { particles.push(new StepParticle(x, y)); }
            
            function drawBody() {
                if (spider.showShadow) {
                    ctx.beginPath();
                    ctx.ellipse(spider.x + 4, spider.y + 6, spider.bodyRadius * 1.1, spider.bodyRadius * 0.7, 0, 0, 2 * Math.PI);
                    ctx.fillStyle = 'rgba(0,0,0,0.35)';
                    ctx.fill();
                }
                const grad = ctx.createRadialGradient(spider.x - 5, spider.y - 5, 5, spider.x, spider.y, spider.bodyRadius);
                grad.addColorStop(0, '#3a3a3a');
                grad.addColorStop(1, '#151515');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(spider.x, spider.y, spider.bodyRadius, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = '#0a0a0a';
                ctx.beginPath();
                ctx.ellipse(spider.x - 6, spider.y - 4, 4, 3, 0, 0, 2 * Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(spider.x + 6, spider.y - 4, 4, 3, 0, 0, 2 * Math.PI);
                ctx.fill();
                ctx.font = `${spider.bodyRadius * 0.7}px monospace`;
                ctx.fillStyle = '#4caf50';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#4caf50';
                ctx.fillText('🕷️', spider.x - 12, spider.y - 10);
                ctx.fillText('⚛️', spider.x + 8, spider.y + 12);
                ctx.shadowBlur = 0;
            }
            
            function drawEyes() {
                const eyeOffX = spider.bodyRadius * 0.55, eyeOffY = spider.bodyRadius * 0.55;
                let lookX = 0, lookY = 0;
                if (touchPoint.active && touchPoint.x && touchPoint.y) {
                    const dx = touchPoint.x - spider.x, dy = touchPoint.y - spider.y, dist = Math.hypot(dx, dy);
                    if (dist > 0.1) { lookX = (dx / dist) * 3.5; lookY = (dy / dist) * 3.5; }
                }
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(spider.x - eyeOffX, spider.y - eyeOffY, spider.eyeRadius, 0, 2 * Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(spider.x + eyeOffX, spider.y - eyeOffY, spider.eyeRadius, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = '#4caf50';
                ctx.beginPath();
                ctx.arc(spider.x - eyeOffX + lookX, spider.y - eyeOffY + lookY, 2.5, 0, 2 * Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(spider.x + eyeOffX + lookX, spider.y - eyeOffY + lookY, 2.5, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(spider.x - eyeOffX + lookX - 1, spider.y - eyeOffY + lookY - 1, 0.8, 0, 2 * Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(spider.x + eyeOffX + lookX - 1, spider.y - eyeOffY + lookY - 1, 0.8, 0, 2 * Math.PI);
                ctx.fill();
            }
            
            function updateMovement() {
                if (touchPoint.active && touchPoint.x && touchPoint.y) {
                    const dx = touchPoint.x - spider.x, dy = touchPoint.y - spider.y, dist = Math.hypot(dx, dy);
                    if (dist > 3) {
                        spider.x += dx * spider.speed;
                        spider.y += dy * spider.speed;
                        spider.legWave += spider.legSpeed;
                        if (Math.random() < 0.25) addStepParticle(spider.x - 5, spider.y + 5);
                    } else {
                        spider.x = touchPoint.x; spider.y = touchPoint.y;
                        for (let i = 0; i < 6; i++) addStepParticle(spider.x, spider.y);
                    }
                } else {
                    spider.legWave += 0.03;
                }
            }
            
            function drawBackground() {
                ctx.fillStyle = 'rgba(0,0,0,0)';
                ctx.clearRect(0, 0, w, h);
                ctx.fillStyle = 'transparent';
                ctx.fillRect(0, 0, w, h);
            }
            
            function animate() {
                if (!w || !h) return;
                updateMovement();
                particles = particles.filter(p => p.update());
                drawBackground();
                let targetAngle = null;
                if (touchPoint.active && touchPoint.x && touchPoint.y) targetAngle = Math.atan2(touchPoint.y - spider.y, touchPoint.x - spider.x);
                for (let leg of spider.legs) leg.draw(ctx, spider.x, spider.y, spider.bodyRadius, spider.legWave, targetAngle);
                drawBody();
                drawEyes();
                for (let p of particles) p.draw(ctx);
                if (touchPoint.active && touchPoint.x && touchPoint.y) {
                    ctx.beginPath();
                    ctx.arc(touchPoint.x, touchPoint.y, 12, 0, 2 * Math.PI);
                    ctx.strokeStyle = '#4caf50';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(touchPoint.x, touchPoint.y, 5, 0, 2 * Math.PI);
                    ctx.fillStyle = 'rgba(76, 175, 80, 0.3)';
                    ctx.fill();
                }
                requestAnimationFrame(animate);
            }
            
            function handleTouchStart(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                touchPoint.x = (touch.clientX - rect.left) * (w / rect.width);
                touchPoint.y = (touch.clientY - rect.top) * (h / rect.height);
                touchPoint.active = true;
                for (let i = 0; i < 8; i++) addStepParticle(touchPoint.x, touchPoint.y);
            }
            function handleTouchMove(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                touchPoint.x = (touch.clientX - rect.left) * (w / rect.width);
                touchPoint.y = (touch.clientY - rect.top) * (h / rect.height);
                touchPoint.active = true;
            }
            function handleTouchEnd(e) {
                e.preventDefault();
                touchPoint.active = false;
                for (let i = 0; i < 5; i++) addStepParticle(spider.x, spider.y);
            }
            
            function resizeCanvas() {
                w = window.innerWidth;
                h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
                spider.x = w / 2;
                spider.y = h / 2;
            }
            
            document.getElementById('resetBtn').onclick = () => {
                spider.x = w / 2;
                spider.y = h / 2;
                touchPoint.active = false;
                for (let i = 0; i < 15; i++) addStepParticle(spider.x, spider.y);
            };
            let legVisible = true;
            document.getElementById('legBtn').onclick = (e) => {
                legVisible = !legVisible;
                spider.showLegs = legVisible;
                e.target.textContent = legVisible ? "🦵 إخفاء الأرجل" : "🦵 إظهار الأرجل";
            };
            let shadowVisible = true;
            document.getElementById('shadowBtn').onclick = (e) => {
                shadowVisible = !shadowVisible;
                spider.showShadow = shadowVisible;
                e.target.textContent = shadowVisible ? "🌑 إخفاء الظل" : "🌑 إظهار الظل";
            };
            
            function init() {
                resizeCanvas();
                initLegs();
                for (let i = 0; i < 20; i++) addStepParticle(spider.x, spider.y);
                canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
                canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
                canvas.addEventListener('touchend', handleTouchEnd);
                window.addEventListener('resize', resizeCanvas);
                animate();
            }
            init();
        })();
    </script>
</body>
</html>
